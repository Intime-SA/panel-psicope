<html lang="es-AR">
<head>
<meta charset="UTF-8">
<title>Consultorio Psicopedagógico</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: #FAFAF7;
  color: #2C3338;
  font-size: 14px;
  line-height: 1.5;
}
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: 14px; }

/* Layout */
.app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
.sidebar {
  background: #FFFFFF;
  border-right: 1px solid #E5E7EB;
  padding: 18px 12px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar h1 {
  font-size: 16px;
  margin: 0 0 4px 8px;
  color: #4F7CAC;
  letter-spacing: 0.3px;
}
.sidebar .subtitle {
  font-size: 11px;
  color: #6B7280;
  margin: 0 0 24px 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.nav { display: flex; flex-direction: column; gap: 2px; }
.nav button {
  text-align: left;
  background: transparent;
  border: none;
  padding: 9px 12px;
  border-radius: 6px;
  color: #2C3338;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav button:hover { background: #F1F4F8; }
.nav button.active { background: #4F7CAC; color: #FFFFFF; }
.nav button .icon { font-size: 15px; opacity: 0.85; }

.sidebar-footer {
  position: absolute;
  bottom: 12px;
  left: 12px;
  right: 12px;
  font-size: 11px;
  color: #9CA3AF;
  padding: 8px;
  border-top: 1px solid #F0F0F0;
}

.main { padding: 28px 36px; max-width: 1200px; }
.page-title { font-size: 22px; font-weight: 600; margin: 0 0 4px 0; color: #1F2937; }
.page-sub { color: #6B7280; margin: 0 0 24px 0; font-size: 13px; }

/* Cards */
.card {
  background: #FFFFFF;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 14px;
}
.card-title { font-size: 13px; font-weight: 600; color: #6B7280; margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 0.4px; }
.empty-state { color: #9CA3AF; font-style: italic; padding: 12px 0; font-size: 13px; }

/* Buttons */
.btn {
  background: #4F7CAC;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
}
.btn:hover { background: #3F6A98; }
.btn-secondary {
  background: #FFFFFF;
  color: #4F7CAC;
  border: 1px solid #4F7CAC;
}
.btn-secondary:hover { background: #F1F4F8; }
.btn-ghost { background: transparent; color: #6B7280; border: 1px solid #E5E7EB; }
.btn-ghost:hover { background: #F9FAFB; color: #2C3338; }
.btn-danger-ghost { background: transparent; color: #B45757; border: 1px solid #E5C5C5; }
.btn-danger-ghost:hover { background: #FBF3F3; }
.btn-sm { padding: 4px 9px; font-size: 12px; }

/* Forms */
.form-row { margin-bottom: 12px; }
.form-row label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #4B5563;
  margin-bottom: 4px;
}
.form-row input, .form-row select, .form-row textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid #D1D5DB;
  border-radius: 6px;
  background: #FFFFFF;
}
.form-row textarea { resize: vertical; min-height: 70px; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  outline: none;
  border-color: #4F7CAC;
  box-shadow: 0 0 0 3px rgba(79, 124, 172, 0.1);
}
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Pacientes */
.pacientes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.paciente-card {
  background: #FFFFFF;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.paciente-card:hover { border-color: #4F7CAC; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.paciente-card.inactivo { opacity: 0.55; }
.pc-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; color: #1F2937; }
.pc-meta { font-size: 12px; color: #6B7280; margin-bottom: 8px; }
.pc-tag {
  display: inline-block;
  font-size: 11px;
  background: #EEF2F7;
  color: #4F7CAC;
  padding: 2px 8px;
  border-radius: 10px;
  margin-right: 4px;
}
.pc-tag.particular { background: #F4EFE7; color: #B07A3F; }

/* Detalle paciente */
.detalle-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
.detalle-title { font-size: 20px; font-weight: 600; margin: 0; }
.detalle-folder {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
  color: #6B7280;
  background: #F3F4F6;
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-block;
  margin-top: 6px;
  word-break: break-all;
}
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid #E5E7EB;
  margin-bottom: 18px;
}
.tab {
  padding: 9px 14px;
  background: transparent;
  border: none;
  color: #6B7280;
  font-size: 13px;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab:hover { color: #2C3338; }
.tab.active { color: #4F7CAC; border-bottom-color: #4F7CAC; }

/* Agenda */
.agenda-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.agenda-week-label { font-weight: 600; font-size: 15px; min-width: 220px; text-align: center; }
.agenda-grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 1fr);
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  overflow: hidden;
  background: #FFFFFF;
}
.agenda-cell { border-right: 1px solid #F0F0F0; border-bottom: 1px solid #F0F0F0; padding: 6px; min-height: 56px; position: relative; }
.agenda-cell:last-child { border-right: none; }
.agenda-cell.header { background: #F7F8FA; font-weight: 600; font-size: 12px; text-align: center; padding: 10px 6px; color: #4B5563; }
.agenda-cell.header.today { background: #EEF2F7; color: #4F7CAC; }
.agenda-cell.hour { background: #F7F8FA; font-size: 11px; color: #6B7280; text-align: center; padding-top: 10px; }
.agenda-cell.slot { cursor: pointer; }
.agenda-cell.slot:hover { background: #F9FAFB; }
.agenda-cell.slot.today { background: #FCFCFA; }
.session-chip {
  background: #4F7CAC;
  color: white;
  font-size: 11px;
  padding: 4px 7px;
  border-radius: 4px;
  margin-bottom: 3px;
  cursor: pointer;
  line-height: 1.3;
}
.session-chip.realizada { background: #59A57F; }
.session-chip.cancelada { background: #C0696A; opacity: 0.7; text-decoration: line-through; }

/* Sesiones */
.sesion-item {
  border-left: 3px solid #4F7CAC;
  padding: 10px 14px;
  background: #FFFFFF;
  border: 1px solid #E5E7EB;
  border-left-color: #4F7CAC;
  border-radius: 6px;
  margin-bottom: 8px;
}
.sesion-item.realizada { border-left-color: #59A57F; }
.sesion-item.cancelada { border-left-color: #C0696A; opacity: 0.7; }
.sesion-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.sesion-date { font-weight: 600; font-size: 14px; }
.sesion-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #EEF2F7;
  color: #4F7CAC;
}
.sesion-status.realizada { background: #E8F3EC; color: #59A57F; }
.sesion-status.cancelada { background: #F8E8E8; color: #B45757; }
.sesion-status.cobrado    { background: #D1F2D9; color: #1F7A3A; font-weight: 600; }
.sesion-status.pendiente  { background: #FFF1D6; color: #A05F00; font-weight: 600; }
.sesion-status.rechazado  { background: #FBD9D9; color: #9B2424; font-weight: 600; }
.sesion-foco { font-size: 13px; color: #2C3338; margin-bottom: 4px; }
.sesion-obs { font-size: 12px; color: #6B7280; white-space: pre-wrap; }

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 26, 38, 0.45);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  z-index: 100;
  overflow-y: auto;
  padding: 40px 20px;
}
.modal {
  background: white;
  border-radius: 10px;
  max-width: 640px;
  width: 100%;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 17px; font-weight: 600; margin: 0; }
.modal-close { background: transparent; border: none; font-size: 22px; color: #9CA3AF; cursor: pointer; padding: 0; line-height: 1; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid #F0F0F0; }

/* Hoy */
.hoy-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; }
@media (max-width: 900px) { .hoy-grid { grid-template-columns: 1fr; } .app { grid-template-columns: 1fr; } .sidebar { position: relative; height: auto; } }
.hoy-sesion { display: flex; gap: 14px; align-items: center; padding: 12px; background: #F9FAFB; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
.hoy-sesion:hover { background: #F1F4F8; }
.hoy-hora { font-weight: 600; color: #4F7CAC; font-size: 16px; min-width: 56px; }
.hoy-info { flex: 1; }
.hoy-paciente { font-weight: 600; }
.hoy-foco { font-size: 12px; color: #6B7280; margin-top: 2px; }

/* Misc */
.text-muted { color: #6B7280; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
.divider { height: 1px; background: #E5E7EB; margin: 16px 0; }
.copy-hint {
  font-size: 11px;
  color: #6B7280;
  margin-top: 4px;
}
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi-card { background: white; border: 1px solid #E5E7EB; padding: 14px; border-radius: 8px; }
.kpi-num { font-size: 24px; font-weight: 600; color: #4F7CAC; }
.kpi-label { font-size: 11px; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #2C3038;
  color: white;
  padding: 12px 18px;
  border-radius: 8px;
  display: flex;
  gap: 16px;
  align-items: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  z-index: 200;
  font-size: 13px;
  max-width: 90vw;
  animation: toastIn 0.2s ease-out;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(8px);} to { opacity:1; transform: translateX(-50%) translateY(0);} }
.toast-undo {
  background: transparent;
  color: #7FB7E8;
  border: 1px solid rgba(127, 183, 232, 0.4);
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 5px;
  font-family: inherit;
}
.toast-undo:hover { background: rgba(127, 183, 232, 0.15); border-color: #7FB7E8; }

/* Undo button en sidebar */
.undo-btn {
  width: 100%;
  background: transparent;
  border: 1px solid #E5E7EB;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 12px;
  color: #6B7280;
  cursor: pointer;
  margin-bottom: 8px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 6px;
}
.undo-btn:hover:not(:disabled) { background: #F1F4F8; color: #4F7CAC; border-color: #C7D6E5; }
.undo-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Horarios fijos */
.horario-fijo-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.horario-fijo-row select, .horario-fijo-row input { padding: 6px 8px; border: 1px solid #D1D5DB; border-radius: 6px; background: #FFFFFF; }
.horario-fijo-row select { flex: 0 0 140px; }
.horario-fijo-row input[type="time"] { flex: 0 0 130px; }
.horario-fijo-empty { color: #9CA3AF; font-style: italic; font-size: 13px; padding: 6px 0; }

/* Print */
@media print {
  .sidebar, .no-print { display: none !important; }
  .app { grid-template-columns: 1fr; }
  .main { padding: 0; max-width: none; }
  body { background: white !important; background-image: none !important; }
  .card { box-shadow: none; border-color: #ccc; page-break-inside: avoid; }
}

/* Modales */

   ANOTADOR PERSONAL — tercera columna, libreta siempre a la vista
   ============================================================ */

/* Layout: por default solo sidebar + main (sin libreta).
   En la vista Hoy agregamos la 3ª columna y mostramos la libreta. */
.app { grid-template-columns: 200px 1fr; }
.anotador-panel { display: none !important; }
body.view-hoy .app { grid-template-columns: 200px 1fr auto; }
body.view-hoy .anotador-panel { display: flex !important; }

/* La libreta como widget tipo card sticky, redimensionable en alto y ancho.
   margin-top alineado con la fila de KPIs (page-title + page-sub + sus márgenes ≈ 78px,
   más el padding-top del main (28px) = 106px). */
.anotador-panel {
  position: sticky;
  top: 106px;
  align-self: start;
  margin: 106px 18px 28px 0;
  width: 240px;
  min-width: 200px;
  max-width: 460px;
  height: 320px;
  min-height: 220px;
  max-height: calc(100vh - 134px);
  resize: both;
  background: #FFFBE9;
  background-image:
    linear-gradient(#FFFBE9 0, #FFFBE9 100%),
    repeating-linear-gradient(transparent 0, transparent 26px, #F0E2A8 26px, #F0E2A8 27px);
  background-blend-mode: multiply;
  border: 1.5px solid #F2D27A;
  border-radius: 14px;
  box-shadow: 0 3px 14px rgba(155,137,217,0.08), 0 1px 3px rgba(242,210,122,0.10);
  flex-direction: column;
  overflow: hidden;
  /* display lo controla la regla condicional body.view-hoy más abajo (none por default, flex en Hoy) */
}
/* Hint del handle de resize (Chrome/Edge muestra rayitas en la esquina) */
.anotador-panel::after {
  content: "";
  position: absolute;
  right: 4px;
  bottom: 4px;
  width: 12px;
  height: 12px;
  background-image:
    linear-gradient(135deg, transparent 50%, #C9A878 50%, #C9A878 60%, transparent 60%, transparent 70%, #C9A878 70%, #C9A878 80%, transparent 80%);
  pointer-events: none;
  opacity: 0.6;
}
.anotador-panel::before {
  /* "Margen rojo" izquierdo tipo cuaderno */
  content: "";
  position: absolute;
  left: 22px;
  top: 0;
  bottom: 0;
  width: 1.5px;
  background: #E8A0A0;
  opacity: 0.45;
}

/* Responsive: en pantallas chicas la libreta (cuando esté visible) cae abajo del main */
@media (max-width: 850px) {
  body.view-hoy .app { grid-template-columns: 200px 1fr; }
  body.view-hoy .anotador-panel {
    grid-column: 1 / -1;
    position: relative;
    top: auto;
    margin: 14px 24px 24px 24px;
    width: auto;
    max-width: none;
    max-height: 280px;
  }
}
@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; }
  body.view-hoy .app { grid-template-columns: 1fr; }
  body.view-hoy .anotador-panel { grid-column: 1; margin: 14px; }
}

// PAPELERA / DESHACER
// ============================================================
const MAX_PAPELERA = 200;

function enviarAPapelera(tipo, descripcion, data, relacionados) {
  state.papelera.push({
    id: "pap_" + Date.now() + "_" + Math.random().toString(36).slice(2,8),
    tipo, descripcion,
    data: JSON.parse(JSON.stringify(data)),
    relacionados: relacionados ? JSON.parse(JSON.stringify(relacionados)) : null,
    timestamp: Date.now()
  });
  if (state.papelera.length > MAX_PAPELERA) state.papelera.shift();
}

function restaurarDePapelera(papId) {
  const i = state.papelera.findIndex(x => x.id === papId);
  if (i < 0) return null;
  const item = state.papelera[i];
  switch (item.tipo) {
    case "paciente":
      state.pacientes.push(item.data);
      if (item.relacionados) {
        (item.relacionados.sesiones||[]).forEach(s => state.sesiones.push(s));
        (item.relacionados.facturacion||[]).forEach(f => state.facturacion.push(f));
        (item.relacionados.turnos||[]).forEach(t => state.turnos.push(t));
      }
      break;
    case "sesion": state.sesiones.push(item.data); break;
    case "turno": state.turnos.push(item.data); break;
    case "fac": state.facturacion.push(item.data); break;
    case "gasto": state.gastos.push(item.data); break;
    case "presentacion": state.presentaciones.push(item.data); break;
    case "reset":
      // Restaurar el snapshot completo
      Object.assign(state, item.data);
      break;
  }
  state.papelera.splice(i, 1);
  return item;
}

function eliminarDePapelera(papId) {
  state.papelera = state.papelera.filter(x => x.id !== papId);
}

function vaciarPapelera() {
  state.papelera = [];
}

function doUndo() {
  if (state.papelera.length === 0) return;
  const item = state.papelera[state.papelera.length - 1];
  const restored = restaurarDePapelera(item.id);
  if (!restored) return;
  if (currentPacienteId && !pacienteById(currentPacienteId)) currentPacienteId = null;
  saveState(); render(); refreshUndoBtn();
  showToast(`Restaurado: ${restored.descripcion}`);
}

function refreshPapeleraCounter() {
  const el = document.getElementById("pap-count");
  if (!el) return;
  const n = (state.papelera||[]).length;
  el.textContent = n > 0 ? n : "";
  el.style.display = n > 0 ? "inline-block" : "none";
}

function refreshUndoBtn() {
  const btn = document.getElementById("undo-btn");
  const lbl = document.getElementById("undo-label");
  if (!btn || !lbl) return;
  if (!state.papelera || state.papelera.length === 0) {
    btn.disabled = true;
    lbl.textContent = "Nada que deshacer";
  } else {
    btn.disabled = false;
    const last = state.papelera[state.papelera.length - 1];
    lbl.textContent = `Deshacer: ${last.descripcion}`;
  }
}

function showToast(msg, undoFn) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const toast = document.createElement("div");
  toast.className = "toast";
  const span = document.createElement("span");
  span.textContent = msg;
  toast.appendChild(span);
  if (undoFn) {
    const btn = document.createElement("button");
    btn.className = "toast-undo";
    btn.textContent = "Deshacer";
    btn.addEventListener("click", () => { undoFn(); toast.remove(); });
    toast.appendChild(btn);
  }
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 8000);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      return migrarEstado(JSON.parse(raw));
    }
  } catch (e) { console.error("Error cargando estado", e); }
  return JSON.parse(JSON.stringify(INITIAL_STATE));
}
function migrarEstado(loaded) {
      // Migrar: agregar campos nuevos si no existen
      if (!loaded.facturacion) loaded.facturacion = JSON.parse(JSON.stringify(INITIAL_STATE.facturacion));
      if (!loaded.gastos) loaded.gastos = JSON.parse(JSON.stringify(INITIAL_STATE.gastos));
      if (!loaded.presentaciones) loaded.presentaciones = JSON.parse(JSON.stringify(INITIAL_STATE.presentaciones));
      if (!loaded.papelera) loaded.papelera = [];
      if (!loaded.anotador) loaded.anotador = [];
      if (!loaded.notasCalendario) loaded.notasCalendario = [];
      // Si no hay leyendas cargadas, pre-cargar las iniciales
      if (!loaded.leyendas || loaded.leyendas.length === 0) {
        loaded.leyendas = JSON.parse(JSON.stringify(INITIAL_STATE.leyendas));
      } else {
        // Migración: si las leyendas pre-cargadas existen pero todavía no tienen variables, actualizarlas
        const iniciales = new Map(INITIAL_STATE.leyendas.map(l => [l.id, l]));
        loaded.leyendas = loaded.leyendas.map(l => {
          if (iniciales.has(l.id) && !/\{[a-zA-ZñÑáéíóúÁÉÍÓÚ]+\}/.test(l.texto||"")) {
            return JSON.parse(JSON.stringify(iniciales.get(l.id)));
          }
          return l;
        });
        // Migración: pasar de pacienteId (single) a pacienteIds (array)
        loaded.leyendas.forEach(l => {
          if (!l.pacienteIds) {
            l.pacienteIds = l.pacienteId ? [l.pacienteId] : [];
          }
          if (!l.datosFacturacion) l.datosFacturacion = "";
        });
        // Si una leyenda pre-cargada NO tiene datosFacturacion pero la versión inicial sí los tiene,
        // forzar actualización (con datos separados). Solo si la usuaria no editó el texto.
        const inicialesMap = new Map(INITIAL_STATE.leyendas.map(l => [l.id, l]));
        loaded.leyendas.forEach(l => {
          const ini = inicialesMap.get(l.id);
          if (ini && ini.datosFacturacion && !l.datosFacturacion) {
            // Si el texto actual contiene parte de los datos de facturación, asumimos que es pre-cargado
            l.datosFacturacion = ini.datosFacturacion;
            l.texto = ini.texto;
          }
        });

      });
      return loaded;
}

function programarGuardadoServidor() {
  if (!__syncEnabled) return;
  if (__syncTimer) clearTimeout(__syncTimer);
  setSyncBadge("● cambios sin guardar", "#b8860b");
  __syncTimer = setTimeout(guardarEnServidor, 800);
}
async function guardarEnServidor() {
  if (!__syncEnabled) return;
  try {
    setSyncBadge("⟳ guardando…", "#555");
    const res = await fetch("/api/state", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    setSyncBadge("✓ guardado", "#2e7d32");
    ocultarBadge();
  } catch (e) {
    console.error("Error guardando en servidor", e);
    setSyncBadge("⚠ sin conexión (guardado local)", "#c62828");
  }
}
async function cargarDesdeServidor() {
  try {
    const res = await fetch("/api/state", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (!data || data.error) throw new Error((data && data.error) || "sin datos");
    const listas = ["pacientes","sesiones","turnos","facturacion","gastos","presentaciones","objetivos","leyendas","notasCalendario","papelera","anotador"];
    const vacio = !data.config && listas.every(k => !Array.isArray(data[k]) || data[k].length === 0);
    if (vacio) {
      // Base vacía: conservamos lo local y lo subimos como estado inicial.
      __syncEnabled = true;
      await guardarEnServidor();
      return;
    }
    state = migrarEstado(data);
    __syncEnabled = true;
    setSyncBadge("✓ sincronizado", "#2e7d32");
    ocultarBadge();
  } catch (e) {
    console.warn("No se pudo cargar del servidor, uso copia local:", e.message);
    __syncEnabled = true; // reintentará al guardar
    setSyncBadge("⚠ sin servidor (modo local)", "#c62828");
  }
}

// Edad calculada a partir de fecha de nacimiento ISO (yyyy-mm-dd)
function calcularEdad(fechaNacISO) {
  if (!fechaNacISO) return null;
  const nac = new Date(fechaNacISO + "T00:00:00");
  if (isNaN(nac.getTime())) return null;
  const hoy = new Date();
  let edad = hoy.getFullYear() - nac.getFullYear();
  const m = hoy.getMonth() - nac.getMonth();
  if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
  return edad >= 0 ? edad : null;
}

  if (!p) return null;

  return calc != null ? calc : (p.edad != null && p.edad !== "" ? Number(p.edad) : null);
}

// Devuelve 42 días (6 semanas) para grilla mensual, empezando el lunes anterior al 1° del mes
function diasGrillaMes(yyyymm) {
  const [y, m] = yyyymm.split("-").map(Number);
  const primero = new Date(y, m-1, 1);
  const dow = primero.getDay();  // 0=Dom, 1=Lun, ..., 6=Sab
  const offset = dow === 0 ? -6 : 1 - dow;  // arranca en Lunes
  const inicio = new Date(y, m-1, 1 + offset);
  const dias = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(inicio);
    d.setDate(d.getDate() + i);
    dias.push({
      iso: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`,
      dia: d.getDate(),
      mismoMes: d.getMonth() === m-1,
      dow: d.getDay()
    });
  }
  return dias;
}

// Helpers monetarios y de meses
function fmtMoney(n) {
  if (n == null || isNaN(n)) return "$ 0";
  const neg = n < 0;
  const abs = Math.abs(Number(n));
  const parts = abs.toFixed(2).split(".");
  const int = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const dec = parts[1] === "00" ? "" : "," + parts[1];
  return (neg ? "-" : "") + "$ " + int + dec;
}
function parseMoney(s) {
  if (s == null) return 0;
  let str = String(s).replace(/[\$\s]/g, "").trim();
  if (!str) return 0;
  // Si tiene coma → formato AR (punto=miles, coma=decimal). Ej: "150.050,44" → "150050.44"
  if (str.includes(",")) {
    str = str.replace(/\./g, "").replace(",", ".");
  } else {
    // No tiene coma. Decidir si los puntos son miles o decimal.
    const dotCount = (str.match(/\./g) || []).length;
    if (dotCount > 1) {
      // Múltiples puntos = miles AR sin decimales. "1.234.567" → "1234567"
      str = str.replace(/\./g, "");
    } else if (dotCount === 1) {
      const parts = str.split(".");
      // Si tras el punto hay exactamente 3 dígitos, asumimos separador de miles AR ("150.050" → 150050).
      // Si hay 1 ó 2 dígitos, es decimal estilo US ("150.44").
      if (parts[1].length === 3) str = parts.join("");
    }
  }
  const n = parseFloat(str);
  return isNaN(n) ? 0 : n;
}

  const int = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const dec = parts[1] === "00" ? "" : "," + parts[1];
  return (n < 0 ? "-" : "") + int + dec;
}

// Slots de agenda derivados de config
function getSlots() {
  const cfg = state.config;
  const dur = cfg.slotMinutes || 45;
  const [hi, mi] = (cfg.horaInicio || "08:00").split(":").map(Number);
  const [hf, mf] = (cfg.horaFin || "20:00").split(":").map(Number);
  const slots = [];
  let cur = hi * 60 + mi;
  const end = hf * 60 + mf;
  while (cur < end) {
    const h = Math.floor(cur / 60);
    const m = cur % 60;
    slots.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
    cur += dur;
  }
  return slots;
}
function turnoEnSlot(t, slot) {
  if (!t.hora || !slot) return false;
  const dur = state.config.slotMinutes || 45;
  const [sh, sm] = slot.split(":").map(Number);
  const [th, tm] = t.hora.split(":").map(Number);
  const slotStart = sh * 60 + sm;
  const turnoTime = th * 60 + tm;
  return turnoTime >= slotStart && turnoTime < slotStart + dur;
}

function fechasDelMes(yyyymm, diaSemanaTarget) {
  // diaSemanaTarget: 0 (Dom) - 6 (Sab)
  const [y, m] = yyyymm.split("-").map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const out = [];
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(y, m-1, d);
    if (dt.getDay() === diaSemanaTarget) {
      out.push(`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
    }
  }
  return out;
}

function generarTurnosRecurrentes(opts) {
  opts = opts || {};
  const mesBase = opts.mesBase || mesActualISO();
  const meses = opts.meses || [mesBase, mesNext(mesBase)];
  let agregados = 0;
  // Index para dedupe rápido
  const idx = new Set(state.turnos.map(t => `${t.pacienteId}|${t.fecha}|${t.hora}`));
  state.pacientes.forEach(p => {
    if (!p.activo) return;
    if (!p.horariosFijos || p.horariosFijos.length === 0) return;
    p.horariosFijos.forEach(hf => {
      if (hf.diaSemana == null || !hf.hora) return;
      meses.forEach(mes => {
        const fechas = fechasDelMes(mes, parseInt(hf.diaSemana));
        fechas.forEach(f => {
          const key = `${p.id}|${f}|${hf.hora}`;
          if (idx.has(key)) return;
          state.turnos.push({
            id: `auto_${p.id}_${f}_${hf.hora.replace(":","")}`,
            fecha: f,
            hora: hf.hora,
            pacienteId: p.id,
            estado: "agendada",
            notas: "",
            auto: true
          });
          idx.add(key);
          agregados++;
        });
      });
    });
  });
  if (agregados > 0) saveState();
  return agregados;
}

// Quita turnos duplicados: si hay varios con el mismo id, dejamos el que no esté "agendada"
// (porque suele ser el editado por la usuaria — realizada/cancelada). Si todos están iguales,
// se queda con el primero. También dedupe por combo paciente+fecha+hora.
function dedupTurnos() {
  if (!Array.isArray(state.turnos)) return;
  // 1) Dedupe por id
  const byId = new Map();
  state.turnos.forEach(t => {
    if (!t || !t.id) return;
    const existing = byId.get(t.id);
    if (!existing) {
      byId.set(t.id, t);
    } else {
      // Preferir el que tenga estado distinto de "agendada"
      if (existing.estado === "agendada" && t.estado && t.estado !== "agendada") {
        byId.set(t.id, t);
      }
    }
  });
  // 2) Dedupe por combo paciente|fecha|hora (toma el más informativo: no-agendada o con notas)
  const byCombo = new Map();
  [...byId.values()].forEach(t => {
    const k = `${t.pacienteId}|${t.fecha}|${t.hora}`;
    const existing = byCombo.get(k);
    if (!existing) {
      byCombo.set(k, t);
    } else {
      const aWeight = (existing.estado && existing.estado !== "agendada" ? 2 : 0) + ((existing.notas||"").trim() ? 1 : 0);
      const bWeight = (t.estado && t.estado !== "agendada" ? 2 : 0) + ((t.notas||"").trim() ? 1 : 0);
      if (bWeight > aWeight) byCombo.set(k, t);
    }
  });
  state.turnos = [...byCombo.values()];
}

function viewAgenda() {
  const pacientesConHorarios = state.pacientes.filter(p => p.activo && (p.horariosFijos||[]).length > 0).length;
  // Toggle de vista + controles comunes
  const toggleHtml = `
    <div style="display:flex;background:#F4F1FA;border:1px solid #E5E0F0;border-radius:9px;padding:2px;gap:2px;">
      <button class="btn btn-sm" data-action="agenda-vista-semana" style="${currentAgendaVista==='semana'?'background:#9B89D9;color:#FFF;':'background:transparent;color:#6B5BA8;'}border:none;padding:5px 12px;font-weight:600;">Semana</button>
      <button class="btn btn-sm" data-action="agenda-vista-mes" style="${currentAgendaVista==='mes'?'background:#9B89D9;color:#FFF;':'background:transparent;color:#6B5BA8;'}border:none;padding:5px 12px;font-weight:600;">Mes</button>
    </div>
  `;
  if (currentAgendaVista === "mes") {
    return viewAgendaMes(toggleHtml, pacientesConHorarios);
  }
  return viewAgendaSemana(toggleHtml, pacientesConHorarios);
}

function viewAgendaSemana(toggleHtml, pacientesConHorarios) {
  const dias = ["Lun","Mar","Mié","Jue","Vie","Sáb"];
  const hoy = hoyISO();
  const fechas = Array.from({length: 6}, (_, i) => addDays(currentWeekStart, i));
  const finSemana = addDays(currentWeekStart, 5);
  const slots = getSlots();

  let html = `
    <h2 class="page-title">Agenda</h2>
    <p class="page-sub">Click en una celda para agendar. Click en un turno para editarlo. Turnos de ${state.config.slotMinutes||45} min.</p>
    <div class="agenda-controls">
      ${toggleHtml}
      <button class="btn-ghost btn btn-sm" data-action="semana-anterior">‹ Anterior</button>
      <div class="agenda-week-label">${fmtFechaCorta(currentWeekStart)} — ${fmtFechaCorta(finSemana)}</div>
      <button class="btn-ghost btn btn-sm" data-action="semana-siguiente">Siguiente ›</button>
      <button class="btn-ghost btn btn-sm" data-action="semana-hoy">Hoy</button>
      <div style="flex:1;"></div>
      <button class="btn btn-sm" data-action="nuevo-turno">+ Nuevo turno</button>
      <button class="btn-secondary btn btn-sm" data-action="generar-turnos" title="${pacientesConHorarios} paciente${pacientesConHorarios!==1?"s":""} con horario habitual">⟳ Generar turnos</button>
      <button class="btn-ghost btn btn-sm" data-action="config-agenda">⚙ Config</button>
    </div>
    <div class="agenda-grid">
      <div class="agenda-cell header">Hora</div>
  `;
  dias.forEach((d, i) => {
    const f = fechas[i];
    const isToday = f === hoy;
    html += `<div class="agenda-cell header ${isToday?"today":""}">${d} ${fmtFechaCorta(f)}</div>`;
  });
  slots.forEach(h => {
    html += `<div class="agenda-cell hour">${h}</div>`;
    dias.forEach((d, i) => {
      const f = fechas[i];
      const isToday = f === hoy;
      const turnosCelda = state.turnos.filter(t => t.fecha === f && turnoEnSlot(t, h));
      html += `<div class="agenda-cell slot ${isToday?"today":""}" data-action="celda-agenda" data-fecha="${f}" data-hora="${h}">`;
      turnosCelda.forEach(t => {
        const p = pacienteById(t.pacienteId);
        const horaShow = t.hora !== h ? `<span style="opacity:0.7;font-size:10px;">${escapeHtml(t.hora)} </span>` : "";
        const esLibre = !!t.etiquetaLibre;
        const label = esLibre ? t.etiquetaLibre : (p ? p.apellido : "?");
        const extraStyle = esLibre ? "background:#D4A88C !important;" : "";
        const icono = esLibre ? "📌 " : "";
        html += `<div class="session-chip ${t.estado || ""}" style="${extraStyle}" data-action="abrir-turno" data-id="${t.id}" title="${escapeHtml(label)}">${horaShow}${icono}${escapeHtml(label)}</div>`;
      });
      html += `</div>`;
    });
  });
  html += `</div>`;
  return html;
}

// Vista mensual de la agenda: grilla 7x6 con turnos y notas por día
function viewAgendaMes(toggleHtml, pacientesConHorarios) {
  const hoy = hoyISO();
  const diasGrilla = diasGrillaMes(currentAgendaMes);
  const diasSemanaHeader = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

  let html = `
    <h2 class="page-title">Agenda</h2>
    <p class="page-sub">Click en un día para ver sus turnos y agregar notas. Los turnos se generan automáticamente para los pacientes con horario habitual.</p>
    <div class="agenda-controls">
      ${toggleHtml}
      <button class="btn-ghost btn btn-sm" data-action="mes-agenda-prev">‹ Anterior</button>
      <div class="agenda-week-label">${mesFmt(currentAgendaMes)}</div>
      <button class="btn-ghost btn btn-sm" data-action="mes-agenda-next">Siguiente ›</button>
      <button class="btn-ghost btn btn-sm" data-action="mes-agenda-hoy">Hoy</button>
      <div style="flex:1;"></div>
      <button class="btn btn-sm" data-action="nuevo-turno">+ Nuevo turno</button>
      <button class="btn-secondary btn btn-sm" data-action="generar-turnos" title="${pacientesConHorarios} paciente${pacientesConHorarios!==1?"s":""} con horario habitual">⟳ Generar turnos</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);background:#FFFFFF;border:1px solid #E5E0F0;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(155,137,217,0.06);">
      ${diasSemanaHeader.map(d => `<div style="background:#F4F1FA;padding:10px 8px;text-align:center;font-weight:700;font-size:12px;color:#6B5BA8;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #E5E0F0;">${d}</div>`).join("")}
      ${diasGrilla.map(d => {
        const turnos = state.turnos.filter(t => t.fecha === d.iso && t.estado !== "cancelada");
        const nota = getNotaDia(d.iso);
        const esHoy = d.iso === hoy;
        const opacity = d.mismoMes ? 1 : 0.35;
        const bgHoy = esHoy ? "background:#EEEAF7;" : "";
        const borderHoy = esHoy ? "outline:2px solid #9B89D9;outline-offset:-2px;" : "";
        return `
          <div data-action="abrir-dia-calendario" data-fecha="${d.iso}"
            style="min-height:90px;padding:6px 8px;border-right:1px solid #ECE8F5;border-bottom:1px solid #ECE8F5;cursor:pointer;opacity:${opacity};display:flex;flex-direction:column;gap:4px;${bgHoy}${borderHoy}">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-weight:${esHoy?700:500};font-size:13px;color:${esHoy?'#6B5BA8':'#2D3142'};">${d.dia}</span>
              ${turnos.length > 0 ? `<span style="background:#9B89D9;color:#FFF;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;">${turnos.length}</span>` : ""}
            </div>
            ${turnos.slice(0,2).map(t => {
              const p = pacienteById(t.pacienteId);
              const label = t.etiquetaLibre ? `📌 ${t.etiquetaLibre}` : (p ? p.apellido : "?");
              const colorBg = t.etiquetaLibre ? "#FFEBD5" : "#EEEAF7";
              const colorTxt = t.etiquetaLibre ? "#A05F1A" : "#6B5BA8";
              return `<div style="font-size:10.5px;background:${colorBg};color:${colorTxt};padding:1px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(label)}</div>`;
            }).join("")}
            ${turnos.length > 2 ? `<div style="font-size:10px;color:#8B91A8;">+${turnos.length-2} más</div>` : ""}
            ${nota ? `<div style="margin-top:auto;font-size:10px;background:#FFF1D6;color:#A05F1A;padding:2px 5px;border-radius:4px;border-left:2px solid #F2D27A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(nota.texto)}">📝 ${escapeHtml(nota.texto)}</div>` : ""}
          </div>
        `;
      }).join("")}
    </div>
  `;
  return html;
}

function viewPacientesLista() {
  const activos = state.pacientes.filter(p => p.activo);
  const inactivos = state.pacientes.filter(p => !p.activo);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <h2 class="page-title">Pacientes</h2>
      <button class="btn" data-action="nuevo-paciente">+ Nuevo paciente</button>

    <div class="pacientes-grid">
      ${activos.map(renderPacienteCard).join("")}

    ${inactivos.length > 0 ? `
      <h3 class="card-title" style="margin-top:28px;">Archivados</h3>
      <div class="pacientes-grid">
        ${inactivos.map(renderPacienteCard).join("")}
      </div>` : ""}

function renderPacienteCard(p) {
  const nSesiones = state.sesiones.filter(s => s.pacienteId === p.id).length;
  const obraTag = p.tipo === "particular" ? '<span class="pc-tag particular">Particular</span>' : '';
  const osTag = p.obraSocial ? `<span class="pc-tag">${escapeHtml(p.obraSocial)}</span>` : "";
  const hfTag = (p.horariosFijos||[]).length > 0 ? `<span class="pc-tag" style="background:#E0EDE0;color:#4A6B4F;">${p.horariosFijos.length} hor.</span>` : "";
  const _ed = edadMostrar(p);
  return `<div class="paciente-card ${p.activo?"":"inactivo"}" data-action="abrir-paciente" data-id="${p.id}">
    <div class="pc-name">${escapeHtml(pacienteNombre(p))}</div>
    <div class="pc-meta">${_ed != null ? _ed+" años · " : ""}${p.grado ? escapeHtml(p.grado) : "Sin grado"}</div>
    <div class="tag-row">${osTag}${obraTag}${hfTag}</div>
    <div class="pc-meta" style="margin-top:8px;">${nSesiones} sesiones registradas</div>
  </div>`;
}

function viewPacienteDetalle() {
  const p = pacienteById(currentPacienteId);
  if (!p) { currentPacienteId = null; return viewPacientesLista(); }
  const tabs = [
    { id: "datos", label: "Paciente" },
    { id: "hc", label: "Historia clínica" },
    { id: "eval", label: "Evaluación" },
    { id: "objetivos", label: "Objetivos" },
    { id: "fortalezas", label: "Fortalezas y desafíos" },
    { id: "sesiones", label: "Sesiones" },
    { id: "cierre", label: "Cierre" },
    { id: "informes", label: "Informes" }
  ];
  // Si el tab actual ya no existe, default a "datos"
  if (!tabs.some(t => t.id === currentPacienteTab)) currentPacienteTab = "datos";
  let content = "";
  if (currentPacienteTab === "datos") content = renderTabDatos(p);
  else if (currentPacienteTab === "hc") content = renderTabHC(p);
  else if (currentPacienteTab === "eval") content = renderTabEval(p);
  else if (currentPacienteTab === "objetivos") content = renderTabObjetivos(p);
  else if (currentPacienteTab === "fortalezas") content = renderTabFortalezas(p);
  else if (currentPacienteTab === "sesiones") content = renderTabSesiones(p);
  else if (currentPacienteTab === "cierre") content = renderTabCierre(p);
  else if (currentPacienteTab === "informes") content = renderTabInformes(p);

  return `
    <button class="btn-ghost btn btn-sm" data-action="volver-pacientes" style="margin-bottom:14px;">‹ Volver</button>
    <div class="detalle-header">
      <div>
        <h2 class="detalle-title">${escapeHtml(pacienteNombre(p))}</h2>
        <p class="page-sub" style="margin:4px 0 0 0;">${edadMostrar(p) != null ? edadMostrar(p) + " años · " : ""}${p.grado ? escapeHtml(p.grado) + " · " : ""}${escapeHtml(p.escuela || "Sin escuela registrada")}</p>
        <div class="tag-row" style="margin-top:6px;">
          ${p.obraSocial ? `<span class="pc-tag">${escapeHtml(p.obraSocial)}</span>` : ""}
          ${p.tipo === "particular" ? '<span class="pc-tag particular">Particular</span>' : ""}
          <span class="pc-tag" style="background:${p.activo?"#E0EDE0":"#F0E5D6"};color:${p.activo?"#4A6B4F":"#7A675C"};">${p.activo?"Activo":"Archivado"}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
        <button class="btn btn-sm" data-action="exportar-paciente" style="background:#7FB89A;" title="Genera un texto con toda la info clínica para pegar en otra conversación con Claude (devolución, informe, supervisión...)">📤 Exportar</button>
        <button class="btn-secondary btn btn-sm" data-action="imprimir-hc">Imprimir HC</button>
        <button class="btn-ghost btn btn-sm" data-action="editar-paciente">Editar</button>
        <button class="btn-ghost btn btn-sm" data-action="toggle-activo">${p.activo?"Archivar":"Reactivar"}</button>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(t => `<button class="tab ${currentPacienteTab===t.id?"active":""}" data-action="tab-paciente" data-tab="${t.id}">${t.label}</button>`).join("")}
    </div>
    ${content}
  `;
}

function generarExportPaciente(p) {
  if (!p) return "";
  const lines = [];
  const sec = titulo => lines.push("", "## " + titulo, "");
  const sub = (label, val) => { if (val) lines.push(`**${label}:** ${val}`); };
  const txt = val => { if (val && String(val).trim()) lines.push(String(val).trim()); };

  // Header
  lines.push(`# Ficha clínica — ${pacienteNombre(p)}`);
  lines.push("");
  lines.push(`_Exportado de Dashboard Consultorio CTP el ${new Date().toLocaleDateString("es-AR")} para uso en consulta con Claude._`);

  // Datos personales
  sec("Datos personales");
  const edadMostrarVal = edadMostrar(p);
  if (edadMostrarVal != null) sub("Edad", edadMostrarVal + " años");
  sub("Fecha de nacimiento", p.fechaNacimiento || null);
  sub("Grado", p.grado);
  sub("Escuela", p.escuela);
  sub("Modalidad", p.tipo === "particular" ? "Particular" : `Por obra social${p.obraSocial?" ("+p.obraSocial+")":""}`);
  sub("Inicio del tratamiento", p.fechaInicio ? fmtFecha(p.fechaInicio) : null);

  // Familia/tutores
  if (p.tutores && p.tutores.length > 0) {
    sec("Familia / tutores");
    p.tutores.forEach(t => {
      const rel = ({madre:"Madre",padre:"Padre",tutor:"Tutor/a",abuelo:"Abuelo/a",otro:"Otro"})[t.relacion] || "Familiar";
      lines.push(`- **${rel}:** ${t.nombre || "(sin nombre)"}${t.ocupacion?` · ${t.ocupacion}`:""}${t.telefono?` · ${t.telefono}`:""}`);
    });
  }

  // Historia clínica
  if (p.motivoConsulta || p.antecedentes || p.entrevistaInicial) {
    sec("Historia clínica");
    if (p.motivoConsulta) { lines.push("### Motivo de consulta"); txt(p.motivoConsulta); lines.push(""); }
    if (p.antecedentes) { lines.push("### Antecedentes"); txt(p.antecedentes); lines.push(""); }
    if (p.entrevistaInicial) { lines.push("### Entrevista inicial"); txt(p.entrevistaInicial); lines.push(""); }
  }

  // Evaluación
  if (p.pruebasAdministradas || p.diagnostico || p.planAbordaje) {
    sec("Evaluación e hipótesis diagnóstica");
    if (p.pruebasAdministradas) { lines.push("### Pruebas administradas"); txt(p.pruebasAdministradas); lines.push(""); }
    if (p.diagnostico) { lines.push("### Diagnóstico / hipótesis clínica"); txt(p.diagnostico); lines.push(""); }
    if (p.planAbordaje) { lines.push("### Plan de abordaje"); txt(p.planAbordaje); lines.push(""); }
  }

  // Fortalezas y desafíos
  if (p.fortalezas || p.desafios) {
    sec("Fortalezas y desafíos");
    if (p.fortalezas) { lines.push("### Fortalezas"); txt(p.fortalezas); lines.push(""); }
    if (p.desafios) { lines.push("### Desafíos"); txt(p.desafios); lines.push(""); }
  }

  // Objetivos mensuales
  const objs = (state.objetivos||[]).filter(o => o.pacienteId === p.id);
  if (objs.length > 0) {
    sec("Objetivos mensuales");
    // Agrupar por mes (más reciente primero)
    const porMes = {};
    objs.forEach(o => {
      if (!porMes[o.mes]) porMes[o.mes] = [];
      porMes[o.mes].push(o);
    });
    Object.keys(porMes).sort().reverse().forEach(mes => {
      lines.push(`### ${mesFmt(mes)}`);
      AREAS_OBJ.forEach(area => {
        const items = porMes[mes].filter(o => o.area === area.id);
        if (items.length === 0) return;
        lines.push(`**${area.label}:**`);
        items.forEach(o => {
          const tag = o.estado === "logrado" ? " ✓ LOGRADO" : (o.estado === "suspendido" ? " ✗ SUSPENDIDO" : "");
          lines.push(`- ${o.descripcion}${tag}`);
        });
      });
      lines.push("");
    });
  }

  // Sesiones registradas
  const sesiones = (state.sesiones||[]).filter(s => s.pacienteId === p.id)
    .sort((a,b) => (b.fecha||"").localeCompare(a.fecha||""));
  if (sesiones.length > 0) {
    sec(`Sesiones registradas (${sesiones.length})`);
    // Agrupar por mes
    const porMesSes = {};
    sesiones.forEach(s => {
      const mes = (s.fecha||"sin-fecha").slice(0,7);
      if (!porMesSes[mes]) porMesSes[mes] = [];
      porMesSes[mes].push(s);
    });
    Object.keys(porMesSes).sort().reverse().forEach(mes => {
      lines.push(`### ${mes === "sin-fech" ? "Sin fecha" : mesFmt(mes)} (${porMesSes[mes].length})`);
      porMesSes[mes].forEach(s => {
        const stado = s.estado === "realizada" ? "" : ` _[${s.estado||"planificada"}]_`;
        lines.push(`#### ${fmtFecha(s.fecha)}${stado}`);
        if (s.foco) lines.push(`**Foco:** ${s.foco}`);
        if (s.planificacion) { lines.push(`**Planificación:**`); txt(s.planificacion); }
        if (s.materiales) lines.push(`**Materiales:** ${s.materiales}`);
        if (s.observaciones) { lines.push(`**Registro:**`); txt(s.observaciones); }
        if (s.proximosPasos) lines.push(`**Próximos pasos:** ${s.proximosPasos}`);
        lines.push("");
      });
    });
  }

  // Evolución y cierre
  if (p.evolucion || p.cierre) {
    sec("Evolución y cierre");
    if (p.evolucion) { lines.push("### Evolución"); txt(p.evolucion); lines.push(""); }
    if (p.cierre) { lines.push("### Cierre"); txt(p.cierre); lines.push(""); }
  }

  // Footer
  lines.push("---");
  lines.push("_Información confidencial — uso clínico exclusivo._");

  return lines.join("\n");
}

// Lee el estado actual de los inputs de tutores del DOM y lo aplica al paciente
function leerTutoresDOM(p) {
  if (!p) return;
  const filas = document.querySelectorAll(".tutor-row");
  const nuevos = [];
  filas.forEach((fila, i) => {
    const get = field => {
      const el = fila.querySelector(`[data-tutor-field="${field}"]`);
      return el ? el.value : (p.tutores[i] && p.tutores[i][field]) || "";
    };
    nuevos.push({
      nombre: get("nombre"),
      relacion: get("relacion"),
      ocupacion: get("ocupacion"),
      telefono: get("telefono")
    });
  });
  p.tutores = nuevos;
}

// Meses abiertos en la vista de sesiones (UI state, no se persiste)
let _mesesSesionesAbiertos = null;

// Renderiza sesiones agrupadas por mes con headers colapsables
function renderSesionesPorMes(sesiones) {
  // Agrupar por mes
  const porMes = {};
  sesiones.forEach(s => {
    const mes = (s.fecha||"").slice(0, 7) || "sin-fecha";
    if (!porMes[mes]) porMes[mes] = [];
    porMes[mes].push(s);
  });
  const mesesOrden = Object.keys(porMes).sort().reverse();
  // Inicializar set de abiertos: por defecto, mes más reciente abierto
  if (_mesesSesionesAbiertos === null) {
    _mesesSesionesAbiertos = new Set();
    if (mesesOrden[0]) _mesesSesionesAbiertos.add(mesesOrden[0]);
  }
  return mesesOrden.map(mes => {
    const items = porMes[mes];
    const titulo = mes === "sin-fecha" ? "Sin fecha" : mesFmt(mes);
    const abierto = _mesesSesionesAbiertos.has(mes);
    const realizadas = items.filter(s => s.estado === "realizada").length;
    const planificadas = items.filter(s => !s.estado || s.estado === "planificada").length;
    const stats = [];
    if (realizadas) stats.push(`${realizadas} realizada${realizadas>1?"s":""}`);
    if (planificadas) stats.push(`${planificadas} planificada${planificadas>1?"s":""}`);
    return `
      <div style="margin-bottom:14px;">
        <div data-action="toggle-mes-sesiones" data-mes="${mes}"
          style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:${abierto?"#EEEAF7":"#F4F1FA"};border:1px solid #E5E0F0;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:#6B5BA8;user-select:none;">
          <span>${abierto?"▼":"▶"} 📁 ${titulo}</span>
          <span style="font-size:11.5px;color:#8B91A8;font-weight:500;">${items.length} sesión${items.length!==1?"es":""}${stats.length?` · ${stats.join(", ")}`:""}</span>
        </div>
        ${abierto ? `<div style="padding:8px 0 0 8px;">${items.map(s => {
          const imgs = s.imagenes || [];
          const thumbs = imgs.length === 0 ? "" : `
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
              ${imgs.slice(0, 6).map(im => `<img src="${im.dataUrl}" alt="${escapeHtml(im.nombre)}" style="width:54px;height:54px;object-fit:cover;border-radius:6px;border:1px solid #E5E0F0;cursor:zoom-in;" data-action="zoom-imagen-vista" data-sid="${s.id}" data-iid="${im.id}" onclick="event.stopPropagation();">`).join("")}
              ${imgs.length > 6 ? `<div style="width:54px;height:54px;border-radius:6px;border:1px solid #E5E0F0;background:#F4F1FA;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#6B5BA8;">+${imgs.length-6}</div>` : ""}
            </div>
          `;
          return `
            <div class="sesion-item ${s.estado||""}" data-action="abrir-sesion" data-id="${s.id}">
              <div class="sesion-head">
                <div class="sesion-date">${fmtFecha(s.fecha)} ${s.hora?"· "+escapeHtml(s.hora):""}</div>
                <span class="sesion-status ${s.estado||""}">${escapeHtml(s.estado || "planificada")}</span>
              </div>
              ${s.foco ? `<div class="sesion-foco"><strong>Foco:</strong> ${escapeHtml(s.foco)}</div>` : ""}
              ${s.observaciones ? `<div class="sesion-obs">${escapeHtml(s.observaciones.slice(0, 200))}${s.observaciones.length > 200 ? "…":""}</div>` : ""}
              ${thumbs}
            </div>
          `;
        }).join("")}</div>` : ""}
      </div>
    `;
  }).join("");
}

function renderTabSesiones(p) {
  const sesiones = state.sesiones.filter(s => s.pacienteId === p.id).sort((a,b) => (b.fecha+"").localeCompare(a.fecha+""));
  // ¿Hay un borrador sin guardar de este paciente?
  const borrador = cargarBorradorSesion();
  const borradorPaciente = (borrador && (!borrador.pacienteId || borrador.pacienteId === p.id)) ? borrador : null;
  // Render del item-borrador
  let borradorItem = "";
  if (borradorPaciente) {
    const preview = (borradorPaciente.observaciones || borradorPaciente.foco || borradorPaciente.planificacion || borradorPaciente.materiales || borradorPaciente.proximosPasos || "").trim();
    const d = new Date(borradorPaciente.timestamp || Date.now());
    const cuandoStr = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    const nImgs = (borradorPaciente.imagenes||[]).length;
    borradorItem = `
      <div class="sesion-item" style="background:#FFF8DA;border:2px dashed #F2D27A;border-left:3px solid #F2D27A;cursor:pointer;" data-action="abrir-borrador-sesion" data-pid="${p.id}">
        <div class="sesion-head">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="background:#F2C66A;color:#5A4014;font-size:10px;font-weight:700;padding:3px 9px;border-radius:11px;letter-spacing:0.6px;">📝 BORRADOR</span>
            <span style="font-size:11.5px;color:#8B7A4A;font-style:italic;">guardado el ${cuandoStr} · click para continuar</span>
          </div>
          <button class="btn btn-danger-ghost btn-sm" data-action="descartar-borrador-lista">Descartar</button>
        </div>
        ${borradorPaciente.foco ? `<div class="sesion-foco"><strong>Foco:</strong> ${escapeHtml(borradorPaciente.foco)}</div>` : ""}
        ${preview ? `<div class="sesion-obs">${escapeHtml(preview.slice(0, 200))}${preview.length > 200 ? "…" : ""}</div>` : `<div class="sesion-obs" style="font-style:italic;color:#A89B70;">(sin texto todavía)</div>`}
        ${nImgs > 0 ? `<div style="margin-top:6px;font-size:11.5px;color:#8B7A4A;">📷 ${nImgs} imagen${nImgs>1?"es":""} adjunta${nImgs>1?"s":""}</div>` : ""}
      </div>
    `;
  }
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="margin:0;font-size:14px;color:#6B7280;text-transform:uppercase;letter-spacing:0.4px;">${sesiones.length} sesiones${borradorPaciente?" + 1 borrador":""}</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-sm btn-secondary" data-action="planificar-sesion" data-pid="${p.id}">+ Planificar próxima</button>
        <button class="btn btn-sm" data-action="registrar-sesion" data-pid="${p.id}">+ Registrar sesión</button>
        <button class="btn btn-sm" data-action="grabar-sesion" data-pid="${p.id}" style="background:#7FB89A;">🎙 Por voz</button>
      </div>
    </div>
    ${borradorItem}
    ${sesiones.length === 0 ? '<div class="empty-state">Sin sesiones registradas todavía.</div>' : renderSesionesPorMes(sesiones)}
  `;
}

function viewFacturacion() {
  const tabs = [
    { id: "mensual", label: "Mes actual" },
    { id: "cobranzas", label: "Cobranzas por OS" },
    { id: "resumen", label: "Resumen anual" },
    { id: "leyendas", label: "Leyendas" }
  ];
  let body = "";
  if (currentFacTab === "mensual") body = viewFacMensual();
  else if (currentFacTab === "cobranzas") body = viewFacCobranzas();
  else if (currentFacTab === "resumen") body = viewFacResumen();
  else if (currentFacTab === "leyendas") body = viewFacLeyendas();
  return `
    <h2 class="page-title">Facturación</h2>
    <p class="page-sub">Operativa mensual por paciente, tracker de cobranzas por obra social y resumen anual.</p>
    <div class="tabs">
      ${tabs.map(t => `<button class="tab ${currentFacTab===t.id?"active":""}" data-action="tab-fac" data-tab="${t.id}">${t.label}</button>`).join("")}
    </div>
    ${body}
  `;
}

function viewFacMensual() {
  const items = state.facturacion.filter(f => f.mes === currentMesFact);
  const gastos = state.gastos.filter(g => g.mes === currentMesFact);
  const sub = f => (Number(f.sesiones)||0) * (Number(f.importePorSesion)||0);
  // Ahora consideramos pago granular por sesión dentro de cada línea
  const brutoAbonado = items.reduce((s, f) => s + subLineaAbonado(f), 0);
  const totalDebe = items.reduce((s, f) => s + subLineaDebe(f), 0);
  const itemsConDebe = items.filter(f => subLineaDebe(f) > 0);
  const totalGastos = gastos.reduce((s, g) => s + (Number(g.monto)||0), 0);
  const neto = brutoAbonado - totalGastos;

  // Agrupar por OS/cobertura (solo lo realmente cobrado de cada línea)
  const porOS = {};
  items.forEach(f => {
    const m = subLineaAbonado(f);
    if (m <= 0) return;
    const k = f.obraSocialFact || "—";
    porOS[k] = (porOS[k] || 0) + m;
  });

  return `
    <div class="agenda-controls">
      <button class="btn-ghost btn btn-sm" data-action="mes-fac-prev">‹ Anterior</button>
      <div class="agenda-week-label">${mesFmt(currentMesFact)}</div>
      <button class="btn-ghost btn btn-sm" data-action="mes-fac-next">Siguiente ›</button>
      <button class="btn-ghost btn btn-sm" data-action="mes-fac-hoy">Mes actual</button>
      <div style="flex:1;"></div>
      <button class="btn btn-sm" data-action="nueva-fac">+ Línea</button>
      <button class="btn-secondary btn btn-sm" data-action="nuevo-gasto">+ Gasto</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:#F7F8FA;color:#4B5563;font-size:12px;text-transform:uppercase;letter-spacing:0.3px;">
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Paciente</th>
            <th style="text-align:center;padding:10px;border-bottom:1px solid #E5E7EB;">Ses.</th>
            <th style="text-align:right;padding:10px;border-bottom:1px solid #E5E7EB;">Importe</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">OS/Cobertura</th>
            <th style="text-align:right;padding:10px;border-bottom:1px solid #E5E7EB;">Sub-total</th>
            <th style="text-align:center;padding:10px;border-bottom:1px solid #E5E7EB;">Pago</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Factura</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Detalles</th>
            <th style="padding:10px;border-bottom:1px solid #E5E7EB;"></th>
          </tr>
        </thead>
        <tbody>
          ${items.length === 0 ? `<tr><td colspan="9" style="padding:24px;text-align:center;color:#9CA3AF;font-style:italic;">Sin movimientos cargados para ${mesFmt(currentMesFact)}.</td></tr>` : items.map(f => {
            const p = pacienteById(f.pacienteId);
            const _sub = sub(f);
            const sesN = Number(f.sesiones)||0;
            const ab = lineaAbonadas(f);
            const debe = sesN - ab;
            let pagoChip;
            let rowBg = "";
            if (debe === 0) {
              pagoChip = `<span class="pc-tag" style="background:#DCEFE2;color:#2C5C42;font-weight:600;">Abonada</span>`;
            } else if (ab === 0) {
              pagoChip = `<span class="pc-tag" style="background:#FBE0E0;color:#8A3030;font-weight:600;">Debe ${sesN>1?sesN:""}</span>`;
              rowBg = "background:#FDF6F6;";
            } else {
              pagoChip = `<span class="pc-tag" style="background:#FFEBD5;color:#A05F1A;font-weight:600;">${ab}/${sesN} paga${ab>1?"s":""}</span>`;
              rowBg = "background:#FFFAF1;";
            }
            const esAuto = !!f.auto;
            const nombreCell = esAuto
              ? `<span style="display:inline-block;background:#E0EDE5;color:#2C5C42;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;margin-right:6px;" title="Cobro automático desde una presentación a OS">📥 OS</span>${escapeHtml(p?pacienteNombre(p):"(consolidado)")}`
              : escapeHtml(p?pacienteNombre(p):"(sin paciente)");
            return `<tr style="border-bottom:1px solid #F0F0F0;${rowBg}${esAuto?"background:#F5FAF5;":""}">
              <td style="padding:8px 10px;">${nombreCell}</td>
              <td style="padding:8px 10px;text-align:center;">${escapeHtml(f.sesiones)}</td>
              <td style="padding:8px 10px;text-align:right;">${fmtMoney(f.importePorSesion)}</td>
              <td style="padding:8px 10px;"><span class="pc-tag" style="background:${f.obraSocialFact && f.obraSocialFact.includes("PARTICULAR")?"#F4ECDF":"#F2E5E7"};color:${f.obraSocialFact && f.obraSocialFact.includes("PARTICULAR")?"#B08D5C":"#A8767D"};">${escapeHtml(f.obraSocialFact||"—")}</span></td>
              <td style="padding:8px 10px;text-align:right;font-weight:600;">${fmtMoney(_sub)}</td>
              <td style="padding:8px 10px;text-align:center;">${pagoChip}</td>
              <td style="padding:8px 10px;color:#6B7280;">${escapeHtml(f.factura||"")}</td>
              <td style="padding:8px 10px;color:#6B7280;font-size:12px;">${escapeHtml(f.detalles||"")}</td>
              <td style="padding:8px 10px;text-align:right;"><button class="btn-ghost btn btn-sm" data-action="editar-fac" data-id="${f.id}">···</button></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;">
      <div class="card">
        <h3 class="card-title">Gastos del mes</h3>
        ${gastos.length === 0 ? '<div class="empty-state">Sin gastos cargados este mes.</div>' :
          gastos.map(g => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F0F0F0;font-size:13px;">
            <span>${escapeHtml(g.concepto)}</span>
            <span style="display:flex;gap:8px;align-items:center;">
              <strong>${fmtMoney(g.monto)}</strong>
              <button class="btn-ghost btn btn-sm" data-action="editar-gasto" data-id="${g.id}">···</button>
            </span>
          </div>`).join("")}
      </div>
      <div class="card">
        <h3 class="card-title">Resumen ${mesFmt(currentMesFact)}</h3>
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;"><span>Abonado por pacientes</span><strong style="color:#2C5C42;">${fmtMoney(brutoAbonado)}</strong></div>
        ${Object.entries(porOS).map(([os, m]) => `<div style="display:flex;justify-content:space-between;padding:3px 0 3px 14px;color:#6B7280;font-size:12px;"><span>${escapeHtml(os)}</span><span>${fmtMoney(m)}</span></div>`).join("")}
        ${totalDebe > 0 ? `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px solid #F0E5D6;margin-top:6px;"><span>Pendiente de pago</span><strong style="color:#A05F1A;">${fmtMoney(totalDebe)}</strong></div>` : ""}
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px solid #F0E5D6;margin-top:6px;"><span>Gastos</span><strong style="color:#B85D5D;">- ${fmtMoney(totalGastos)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:15px;border-top:2px solid #C49097;margin-top:6px;"><span><strong>Total mes (neto cobrado)</strong></span><strong style="color:#A8767D;font-size:18px;">${fmtMoney(neto)}</strong></div>
      </div>
    </div>

    ${itemsConDebe.length > 0 ? (() => {
      const sesionesDebe = itemsConDebe.reduce((s,f) => s + ((Number(f.sesiones)||0) - lineaAbonadas(f)), 0);
      const pacUnicos = new Set(itemsConDebe.map(f => f.pacienteId)).size;
      return `
      <div class="card" style="margin-top:14px;background:#FDF6F6;border-color:#F0CACA;">
        <h3 class="card-title" style="color:#8A3030;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          ⚠ Pendiente de pago — ${mesFmt(currentMesFact)}
          <span style="background:#E68A8A;color:#FFFFFF;font-size:11px;font-weight:700;padding:3px 10px;border-radius:11px;text-transform:none;letter-spacing:0.2px;">
            ${sesionesDebe} ${sesionesDebe===1?"sesión":"sesiones"}
          </span>
          <span style="background:#FBE0E0;color:#8A3030;font-size:11px;font-weight:600;padding:3px 10px;border-radius:11px;text-transform:none;letter-spacing:0.2px;">
            ${pacUnicos} ${pacUnicos===1?"paciente":"pacientes"}
          </span>
        </h3>
        <p class="text-muted" style="font-size:12px;margin:0 0 10px 0;">Estas sesiones se hicieron pero todavía no las cobraste. No suman al neto del mes. Cuando te paguen, abrí la línea y subí el contador de "Sesiones abonadas".</p>
        ${itemsConDebe.map(f => {
          const p = pacienteById(f.pacienteId);
          const sesN = Number(f.sesiones)||0;
          const ab = lineaAbonadas(f);
          const debeN = sesN - ab;
          const detalleSesiones = ab === 0
            ? `${debeN} ${debeN===1?"sesión":"sesiones"} sin pagar`
            : `${debeN} de ${sesN} sin pagar (${ab} ya cobrada${ab>1?"s":""})`;
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0E5D6;font-size:13px;">
            <div>
              <strong>${escapeHtml(p?pacienteNombre(p):"(sin paciente)")}</strong>
              <span class="text-muted" style="font-size:11.5px;"> · ${detalleSesiones} · ${escapeHtml(f.obraSocialFact||"—")}</span>
              ${f.detalles ? `<div style="font-size:11.5px;color:#8B7390;">${escapeHtml(f.detalles)}</div>` : ""}
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <strong style="color:#A05F1A;">${fmtMoney(subLineaDebe(f))}</strong>
              <button class="btn-ghost btn btn-sm" data-action="editar-fac" data-id="${f.id}">Editar</button>
            </div>
          </div>`;
        }).join("")}
        <div style="display:flex;justify-content:space-between;padding:10px 0 0 0;font-size:14px;border-top:2px solid #E8B0B0;margin-top:6px;"><span><strong>Total pendiente</strong></span><strong style="color:#8A3030;font-size:16px;">${fmtMoney(totalDebe)}</strong></div>
      </div>
    `;
    })() : ""}
  `;
}

function viewFacCobranzas() {
  const ps = [...state.presentaciones].sort((a,b) => {
    const cmp = (a.mesFacturado||"").localeCompare(b.mesFacturado||"");
    if (cmp) return cmp;
    return (a.obraSocial||"").localeCompare(b.obraSocial||"");
  });
  const totalPresentado = ps.reduce((s,p) => s + (Number(p.monto)||0), 0);
  const totalCobrado = ps.filter(p => p.estado === "cobrado").reduce((s,p) => s + (Number(p.monto)||0), 0);
  const totalPendiente = ps.filter(p => p.estado === "pendiente").reduce((s,p) => s + (Number(p.monto)||0), 0);

  return `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-num">${fmtMoney(totalPresentado)}</div><div class="kpi-label">Presentado total</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:#7A9B7E;">${fmtMoney(totalCobrado)}</div><div class="kpi-label">Cobrado</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:#C49560;">${fmtMoney(totalPendiente)}</div><div class="kpi-label">Pendiente</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <h3 style="margin:0;font-size:14px;color:#6B7280;text-transform:uppercase;letter-spacing:0.4px;">Presentaciones a obras sociales</h3>
      <button class="btn btn-sm" data-action="nueva-presentacion">+ Nueva presentación</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:#F7F8FA;color:#4B5563;font-size:12px;text-transform:uppercase;letter-spacing:0.3px;">
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Mes facturado</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Obra social</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Paciente</th>
            <th style="text-align:right;padding:10px;border-bottom:1px solid #E5E7EB;">Monto</th>
            <th style="text-align:center;padding:10px;border-bottom:1px solid #E5E7EB;">Estado</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Presentado</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Cobrado</th>
            <th style="text-align:center;padding:10px;border-bottom:1px solid #E5E7EB;">Demora</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #E5E7EB;">Notas</th>
            <th style="padding:10px;border-bottom:1px solid #E5E7EB;"></th>
          </tr>
        </thead>
        <tbody>
          ${ps.length === 0 ? `<tr><td colspan="10" style="padding:24px;text-align:center;color:#9CA3AF;font-style:italic;">Sin presentaciones cargadas.</td></tr>` : ps.map(p => {
            const dias = diasEntre(p.fechaPresentacion, p.fechaCobro);
            const pac = p.pacienteId ? pacienteById(p.pacienteId) : null;
            return `<tr style="border-bottom:1px solid #F0F0F0;">
              <td style="padding:8px 10px;">${mesFmt(p.mesFacturado)}</td>
              <td style="padding:8px 10px;"><strong>${escapeHtml(p.obraSocial)}</strong></td>
              <td style="padding:8px 10px;${pac?"":"color:#9CA3AF;font-style:italic;"}font-size:12px;">${pac ? escapeHtml(pacienteNombre(pac)) : "—"}</td>

function viewFacResumen() {
  const año = currentMesFact.split("-")[0];
  const facsAño = state.facturacion.filter(f => f.mes.startsWith(año));
  const gastosAño = state.gastos.filter(g => g.mes.startsWith(año));
  const sub = f => (Number(f.sesiones)||0)*(Number(f.importePorSesion)||0);
  // Pago granular: parte abonada / parte debe por cada línea
  const brutoAño = facsAño.reduce((s,f) => s + subLineaAbonado(f), 0);
  const debeAño = facsAño.reduce((s,f) => s + subLineaDebe(f), 0);
  const gastosTotalAño = gastosAño.reduce((s,g) => s + (Number(g.monto)||0), 0);
  const psAño = state.presentaciones.filter(p => p.mesFacturado.startsWith(año));
  const cobradoAño = psAño.filter(p => p.estado === "cobrado").reduce((s,p) => s + (Number(p.monto)||0), 0);
  const pendienteAño = psAño.filter(p => p.estado === "pendiente").reduce((s,p) => s + (Number(p.monto)||0), 0);

  // Promedio de demora por OS
  const demorasPorOS = {};
  psAño.filter(p => p.fechaPresentacion && p.fechaCobro).forEach(p => {
    const d = diasEntre(p.fechaPresentacion, p.fechaCobro);
    if (!demorasPorOS[p.obraSocial]) demorasPorOS[p.obraSocial] = [];
    demorasPorOS[p.obraSocial].push(d);
  });

  // Por mes (solo la parte abonada de cada línea = ingreso real)
  const porMes = {};
  facsAño.forEach(f => {
    const m = subLineaAbonado(f);
    if (m <= 0) return;
    porMes[f.mes] = (porMes[f.mes] || 0) + m;
  });
  const mesesOrden = Object.keys(porMes).sort();

  return `
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);">
      <div class="kpi-card"><div class="kpi-num">${fmtMoney(brutoAño)}</div><div class="kpi-label">Abonado ${año}</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:#A05F1A;">${fmtMoney(debeAño)}</div><div class="kpi-label">Pendiente de cobro</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:#7A9B7E;">${fmtMoney(cobradoAño)}</div><div class="kpi-label">Cobrado de OS</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:#B85D5D;">${fmtMoney(gastosTotalAño)}</div><div class="kpi-label">Gastos</div></div>
    </div>

    <div class="card">
      <h3 class="card-title">Facturado por mes — ${año}</h3>
      ${mesesOrden.length === 0 ? '<div class="empty-state">Sin datos cargados.</div>' :
        mesesOrden.map(m => {
          const max = Math.max(...Object.values(porMes));
          const pct = (porMes[m]/max)*100;
          return `<div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;">
              <span>${mesFmt(m)}</span><strong>${fmtMoney(porMes[m])}</strong>
            </div>
            <div style="background:#F4ECDF;border-radius:4px;height:8px;"><div style="background:#C49097;height:100%;border-radius:4px;width:${pct}%;"></div></div>
          </div>`;
        }).join("")}
    </div>

    <div class="card">
      <h3 class="card-title">Demora promedio de cobro por obra social</h3>
      ${Object.keys(demorasPorOS).length === 0 ? '<div class="empty-state">Cargá fecha de presentación y fecha de cobro en las presentaciones para ver promedios.</div>' :
        Object.entries(demorasPorOS).map(([os, dias]) => {
          const prom = Math.round(dias.reduce((s,d)=>s+d,0)/dias.length);
          return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F0F0F0;font-size:13px;">
            <span><strong>${escapeHtml(os)}</strong> <span class="text-muted">(${dias.length} cobro${dias.length>1?"s":""})</span></span>
            <span style="color:${prom>90?"#B85D5D":prom>60?"#C49560":"#7A9B7E"};"><strong>${prom} días promedio</strong></span>
          </div>`;
        }).join("")}
    </div>
  `;
}

// Copia la leyenda al portapapeles aplicando variables del paciente seleccionado
function copiarLeyendaAlPortapapeles(l, pacienteId, btnOrigen) {
  const textoFinal = aplicarVariablesLeyenda(l, pacienteId);
  const p = pacienteId ? pacienteById(pacienteId) : null;
  navigator.clipboard.writeText(textoFinal).then(() => {
    if (btnOrigen) {
      btnOrigen.textContent = "✓ Copiado";
      setTimeout(() => { btnOrigen.textContent = "📋 Copiar"; }, 1500);
    }
    cerrarModal();
    showToast(p ? `Leyenda copiada para ${pacienteNombre(p)}` : "Leyenda copiada");
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = textoFinal;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); cerrarModal(); showToast("Leyenda copiada"); } catch(e) { showToast("No pude copiar"); }
    document.body.removeChild(ta);
  });
}

function abrirModal(html) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "modal";
  modal.innerHTML = html;
  modal.addEventListener("click", e => e.stopPropagation());
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", e => {
    if (e.target === backdrop) {
      // Antes de cerrar, intentar guardar borrador si hay modal de sesión/grabador
      guardarBorradorModalActivo();
      cerrarModal();
    }
  });
  document.body.appendChild(backdrop);
  bindHandlers();
  return backdrop;
}
function cerrarModal() {
  document.querySelectorAll(".modal-backdrop").forEach(m => m.remove());
}

const BORRADOR_SES_KEY = "consultorio_ctp_borrador_sesion";
const BORRADOR_GRAB_KEY = "consultorio_ctp_borrador_grabacion";
const BORRADOR_MAX_EDAD = 7 * 24 * 60 * 60 * 1000; // 7 días
let _borradorTimer = null;

function guardarBorradorSesion(pacienteId) {
  const get = id => document.getElementById(id);
  const fields = {
    pacienteId: pacienteId || "",
    fecha: get("s-fecha")?.value || "",
    hora: get("s-hora")?.value || "",

    foco: get("s-foco")?.value || "",
    planificacion: get("s-planificacion")?.value || "",
    materiales: get("s-materiales")?.value || "",
    observaciones: get("s-observaciones")?.value || "",
    proximosPasos: get("s-proximos")?.value || "",
    imagenes: _sesionImagenes || [],
    timestamp: Date.now()
  };
  const tieneContenido = (fields.foco + fields.planificacion + fields.materiales + fields.observaciones + fields.proximosPasos).trim().length > 0 || (fields.imagenes||[]).length > 0;
  if (!tieneContenido) {
    localStorage.removeItem(BORRADOR_SES_KEY);
    actualizarIndicadorBorrador("sin contenido");
    return;
  }
  try {
    localStorage.setItem(BORRADOR_SES_KEY, JSON.stringify(fields));
    const ahora = new Date();
    actualizarIndicadorBorrador("guardado " + String(ahora.getHours()).padStart(2,"0") + ":" + String(ahora.getMinutes()).padStart(2,"0") + ":" + String(ahora.getSeconds()).padStart(2,"0"));
  } catch(e) { actualizarIndicadorBorrador("⚠ error"); }
}
function actualizarIndicadorBorrador(texto) {
  const el = document.getElementById("borrador-indicator");
  if (el) el.textContent = "💾 " + texto;
}
function cargarBorradorSesion() {
  try {
    const raw = localStorage.getItem(BORRADOR_SES_KEY);
    if (!raw) return null;
    const b = JSON.parse(raw);
    if (b.timestamp && (Date.now() - b.timestamp) > BORRADOR_MAX_EDAD) {
      localStorage.removeItem(BORRADOR_SES_KEY);
      return null;
    }
    return b;
  } catch(e) { return null; }
}
function limpiarBorradorSesion() { localStorage.removeItem(BORRADOR_SES_KEY); }

function setupAutoSaveBorrador(pacienteId) {
  const ids = ["s-fecha","s-hora","s-estado","s-foco","s-planificacion","s-materiales","s-observaciones","s-proximos"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el && !el._borradorBound) {
      el._borradorBound = true;
      const onChange = () => {
        clearTimeout(_borradorTimer);
        _borradorTimer = setTimeout(() => guardarBorradorSesion(pacienteId), 200);
      };
      el.addEventListener("input", onChange);
      el.addEventListener("change", onChange);
      // Guardar inmediato al perder foco (sin debounce) por si cierra rapido
      el.addEventListener("blur", () => guardarBorradorSesion(pacienteId));
    }
  });
}

// Procesa una imagen del input file: la lee, la achica a max 900px lado largo y la guarda como JPEG base64.
function procesarImagenArchivo(file, maxDim = 900, quality = 0.78) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) {
      reject(new Error("No es una imagen"));
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        resolve({
          id: "img_" + Date.now() + "_" + Math.random().toString(36).slice(2,6),
          nombre: file.name || "imagen.jpg",
          dataUrl,
          tamañoKB: Math.round(dataUrl.length * 0.75 / 1024),
          timestamp: Date.now()
        });
      };
      img.onerror = () => reject(new Error("No pude cargar la imagen"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Error leyendo el archivo"));
    reader.readAsDataURL(file);
  });
}

        💡 <strong>Tip:</strong> Si el micrófono no se activa desde Cowork, hacé click adentro del cuadro de texto y apretá <kbd style="background:#FFF;border:1px solid #C49560;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px;">Win + H</kbd> para usar el dictado de Windows — funciona sin permisos extra y el texto va a aparecer directo acá.

  // Si ya existe el modal, reemplazar contenido sin reabrirlo (preserva selección, evita parpadeo)

      clearTimeout(_grabTimer);

    });
