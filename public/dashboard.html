}

async function vsvEmpezar() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    _voiceError = "Tu navegador no soporta reconocimiento de voz. Usá Chrome/Edge o pegá el texto a mano.";
    renderModalGrabar();
    return;
  }
  // Pre-check de permiso de micrófono. Sin esto, el SpeechRecognition tira "not-allowed"
  // sin pedir prompt cuando corre en webviews como Cowork.
  _voiceError = "";
  try {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // Solo necesitábamos el permiso; cerramos el stream y dejamos que SpeechRecognition agarre el mic.
      stream.getTracks().forEach(t => t.stop());
    }
  } catch (err) {
    console.error("Mic permission error:", err);
    _voiceError = "Cowork no tiene permiso para usar el micrófono. En Windows: Configuración → Privacidad → Micrófono → permitir acceso a apps de escritorio. Después reiniciá Cowork. Mientras tanto, podés pegar el texto a mano y usar 'Reorganizar con AI'.";
    _voiceState = "idle";
    renderModalGrabar();
    return;
  }
  // Tomamos cualquier edición del textarea hecha antes de empezar a grabar
  const taPrev = document.getElementById("vsv-transcript");
  if (taPrev) _voiceFinal = taPrev.value;

  try {
    _voiceRec = new SR();
    _voiceRec.lang = "es-AR";
    _voiceRec.continuous = true;
    _voiceRec.interimResults = true;
    _voiceRec.onresult = e => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const r = e.results[i];
        if (r.isFinal) _voiceFinal += r[0].transcript + " ";
        else interim += r[0].transcript;
      }
      _voiceInterim = interim;
      const ta = document.getElementById("vsv-transcript");
      if (ta) ta.value = (_voiceFinal + (_voiceInterim ? " " + _voiceInterim : "")).trim();
    };
    _voiceRec.onerror = ev => {
      console.error("Speech error:", ev);
      if (ev.error === "not-allowed" || ev.error === "service-not-allowed") {
        _voiceError = "El navegador bloqueó el micrófono. Habilitalo en Cowork y reintentá; o pegá el texto a mano abajo.";
        _voiceState = "idle";
        try { _voiceRec && _voiceRec.stop(); } catch(e){}
        _voiceRec = null;
        renderModalGrabar();
      } else if (ev.error === "no-speech" || ev.error === "aborted") {
        // suele recuperarse en onend, no hacemos nada acá
      } else {
        _voiceError = "Error de grabación: " + ev.error + ". Podés escribir/pegar el texto a mano.";
        _voiceState = "idle";
        renderModalGrabar();
      }
    };
    _voiceRec.onend = () => {
      if (_voiceState === "recording") {
        // Chrome corta cada ~1min, reintentamos
        try { _voiceRec.start(); } catch(e) { _voiceState = "idle"; renderModalGrabar(); }
      } else {
        renderModalGrabar();
      }
    };
    _voiceRec.start();
    _voiceState = "recording";
    renderModalGrabar();
  } catch(err) {
    _voiceError = "No pude iniciar la grabación: " + err.message + ". Probá pegar el texto a mano.";
    _voiceState = "idle";
    renderModalGrabar();
  }
}

function vsvDetener() {
  _voiceState = "idle";
  if (_voiceRec) {
    try { _voiceRec.stop(); } catch(e) {}
    _voiceRec = null;
  }
  // Tomamos lo que tenga el textarea (por si editó)
  const ta = document.getElementById("vsv-transcript");
  if (ta) _voiceFinal = ta.value;
  _voiceInterim = "";
  guardarBorradorGrabacion();
  renderModalGrabar();
}

async function vsvProcesar() {
  // Tomar texto actual del textarea
  const ta = document.getElementById("vsv-transcript");
  const texto = (ta ? ta.value : _voiceFinal).trim();
  if (!texto) return;
  _voiceFinal = texto;
  _voiceState = "processing";
  renderModalGrabar();

  const prompt = `Sos asistente de una psicopedagoga clínica argentina. Tomá esta transcripción de su registro de sesión y reorganizala en un JSON estricto, sin markdown, con estos campos exactos:

{"foco": "...", "observaciones": "...", "materiales": "...", "proximosPasos": "..."}

- foco: 1 línea, qué se trabajó (ej: "conciencia silábica con palabras bisilábicas").
- observaciones: registro narrativo de lo que pasó en sesión, cómo se acercó, qué pudo, dónde se trabó. Mantené el tono clínico y el rioplatense que use ella. NO inventes datos que no estén.
- materiales: si menciona materiales/recursos usados, listalos. Si no menciona, devolvé "".
- proximosPasos: si menciona qué hacer la próxima o pendientes, ponelo. Si no, "".

Transcripción:
"""${texto}"""

Devolvé SOLO el JSON, sin texto adicional ni \`\`\`.`;

  try {
    const res = await window.cowork.askClaude(prompt, []);
    const raw = (typeof res === "string" ? res : (res?.text || JSON.stringify(res))) || "";
    const cleaned = raw.replace(/```json\s*|\s*```/g, "").trim();
    let parsed = null;
    try { parsed = JSON.parse(cleaned); } catch {
      // intento extraer el primer bloque {…}
      const m = cleaned.match(/\{[\s\S]*\}/);
      if (m) parsed = JSON.parse(m[0]);
    }
    if (!parsed) throw new Error("AI no devolvió JSON válido");
    _voiceParsed = {
      foco: parsed.foco || "",
      observaciones: parsed.observaciones || texto,
      materiales: parsed.materiales || "",
      proximosPasos: parsed.proximosPasos || ""
    };
  } catch (err) {
    console.error(err);
    showToast("No pude reorganizar con AI. Podés guardar igual y editar después.");
    _voiceParsed = { foco: "", observaciones: texto, materiales: "", proximosPasos: "" };
  } finally {
    _voiceState = "ready";
    guardarBorradorGrabacion();
    renderModalGrabar();
  }
}

function vsvGuardar() {
  let data;
  const ta = document.getElementById("vsv-transcript");
  const textoCrudo = ta ? ta.value.trim() : _voiceFinal.trim();
  if (!textoCrudo && !_voiceParsed) {
    _voiceError = "No hay texto para guardar — escribí, pegá o grabá algo primero.";
    renderModalGrabar();
    return;
  }

  const sel = document.getElementById("vsv-paciente");
  const fechaInp = document.getElementById("vsv-fecha");
  const pid = sel ? sel.value : _voicePid;
  const fecha = fechaInp ? fechaInp.value : _voiceFecha;

  if (_voiceParsed && document.getElementById("vsv-foco")) {
    data = {
      id: nuevoId(),
      pacienteId: pid,
      fecha,
      hora: "",
      estado: "realizada",
      foco: document.getElementById("vsv-foco").value.trim(),
      planificacion: "",
      materiales: document.getElementById("vsv-mat").value.trim(),
      observaciones: document.getElementById("vsv-obs").value.trim(),
      proximosPasos: document.getElementById("vsv-prox").value.trim()
    };
  } else {
    // Sin reorganización AI, todo va a observaciones
    data = {
      id: nuevoId(),
      pacienteId: pid,
      fecha,
      hora: "",
      estado: "realizada",
      foco: "",
      planificacion: "",
      materiales: "",
      observaciones: textoCrudo,
      proximosPasos: ""
    };
  }
  state.sesiones.push(data);
  saveState();
  limpiarBorradorGrabacion();  // se guardó la sesión, borrador ya no hace falta
  cerrarModalGrabar();
  // Si el paciente abierto es el mismo, refrescamos
  render();
  const p = pacienteById(pid);
  showToast(`Sesión registrada para ${pacienteNombre(p)} (${fmtFechaCorta(fecha)})`);
}

  _voiceError = "";
  cerrarModal();
}

// Helpers de pago por línea de facturación.
// El campo nuevo es sesionesAbonadas (cantidad). Si no existe, se deriva del viejo estadoPago.
function lineaAbonadas(f) {
  const total = Number(f.sesiones)||0;
  if (f.sesionesAbonadas != null) {
    const n = Number(f.sesionesAbonadas);
    return Math.max(0, Math.min(total, isNaN(n) ? total : n));
  }
  return f.estadoPago === "debe" ? 0 : total;
}
function subLineaAbonado(f) { return lineaAbonadas(f) * (Number(f.importePorSesion)||0); }
function subLineaDebe(f) { return ((Number(f.sesiones)||0) - lineaAbonadas(f)) * (Number(f.importePorSesion)||0); }

// Número a palabra en español (0-20). Sobre 20 devuelve el número como string.
const _NUMEROS_ES = ["cero","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve","diez","once","doce","trece","catorce","quince","dieciséis","diecisiete","dieciocho","diecinueve","veinte"];
function numEnTexto(n) {
  if (n == null || isNaN(n)) return "";
  const i = Number(n);
  return (i >= 0 && i <= 20) ? _NUMEROS_ES[i] : String(i);
}
// Formatea DNI argentino con puntos (12345678 → 12.345.678). Si ya viene con puntos, lo deja.
function fmtDNI(s) {
  if (!s) return "";
  const raw = String(s).replace(/\D/g, "");
  if (raw.length < 7) return String(s);
  return raw.replace(/^(\d{1,2})(\d{3})(\d{3})$/, "$1.$2.$3");
}
// Aplica variables dinámicas a una leyenda: {paciente}, {mes}, {sesiones}, {valor}, etc.
// Aplica variables a un string usando el contexto del paciente
function aplicarVariablesTexto(texto, ctx) {
  return (texto||"").replace(/\{([a-zA-ZñÑáéíóúÁÉÍÓÚ]+)\}/g, (m, k) => {
    return Object.prototype.hasOwnProperty.call(ctx, k) ? ctx[k] : m;
  });
}

function aplicarVariablesLeyenda(l, pacienteIdOverride) {
  if (!l) return "";
  // Prioridad: override > primer paciente del array > pacienteId legacy
  const pid = pacienteIdOverride
    || (Array.isArray(l.pacienteIds) && l.pacienteIds[0])
    || l.pacienteId
    || "";
  const p = pid ? pacienteById(pid) : null;
  const mes = currentMesFact;
  const mesAnterior = mesPrev(mes);
  // Buscar línea de facturación del paciente en el mes actual de fac
  const linea = p ? (state.facturacion||[]).find(f => f.pacienteId === p.id && f.mes === mes && !f.auto) : null;
  const sesN = linea ? (Number(linea.sesiones)||0) : null;
  const valorN = linea ? (Number(linea.importePorSesion)||0) : (p ? (Number(p.importePorSesion)||0) : null);
  const totalN = (sesN != null && valorN != null) ? sesN * valorN : null;
  const sesTxt = sesN != null
    ? `${sesN} (${numEnTexto(sesN)})`
    : "____";
  const ctx = {
    "paciente": p ? `${p.apellido}, ${p.nombre}` : "____",
    "pacienteUC": p ? `${p.apellido}, ${p.nombre}`.toUpperCase() : "____",
    "nombreCompleto": p ? `${p.nombre} ${p.apellido}` : "____",
    "nombreCompletoUC": p ? `${p.nombre} ${p.apellido}`.toUpperCase() : "____",
    "nombre": p ? p.nombre : "____",
    "apellido": p ? p.apellido : "____",
    "dni": p ? fmtDNI(p.dni) : "____",
    "mes": mesFmt(mes),
    "mesAnt": mesFmt(mesAnterior),
    "mesUC": mesFmt(mes).toUpperCase(),
    "mesAntUC": mesFmt(mesAnterior).toUpperCase(),
    "año": mes.split("-")[0],
    "ano": mes.split("-")[0],
    "fecha": new Date().toLocaleDateString("es-AR"),
    "sesiones": sesN != null ? String(sesN) : "____",
    "sesionesTexto": sesTxt,
    "valor": valorN != null && valorN > 0 ? fmtMoney(valorN) : "$ ____",
    "total": totalN != null && totalN > 0 ? fmtMoney(totalN) : "$ ____"
  };
  // Devolver objeto con los dos campos procesados + helper string concatenado
  const datosProcesados = aplicarVariablesTexto(l.datosFacturacion || "", ctx);
  const textoProcesado = aplicarVariablesTexto(l.texto || "", ctx);
  const resultado = String(datosProcesados ? datosProcesados + "\n\n" : "") + textoProcesado;
  // Agregamos propiedades extras al string para retrocompatibilidad
  // (cualquiera que use el retorno como string lo va a tener; los nuevos llamantes pueden usar las propiedades)
  // eslint-disable-next-line no-new-wrappers
  const out = new String(resultado);
  out.datos = datosProcesados;
  out.leyenda = textoProcesado;
  return out;
}

// Sincroniza una presentación cobrada con una línea automática en facturación,
// usando el mes de la fecha de cobro. Si la presentación deja de estar cobrada,
// elimina la línea auto correspondiente.
function syncCobroOSALineaFac(pr) {
  if (!pr || !pr.id) return;
  const idAuto = `auto_cobro_${pr.id}`;
  // Eliminar cualquier línea auto previa para esta presentación
  state.facturacion = state.facturacion.filter(f => f.id !== idAuto);
  // Si está cobrada y hay fecha, crear línea en el mes del cobro
  if (pr.estado === "cobrado" && pr.fechaCobro) {
    const mesCobro = pr.fechaCobro.slice(0, 7);
    state.facturacion.push({
      id: idAuto,
      mes: mesCobro,
      pacienteId: pr.pacienteId || "",
      sesiones: 1,
      sesionesAbonadas: 1,
      importePorSesion: Number(pr.monto) || 0,
      obraSocialFact: pr.obraSocial || "",
      estadoPago: "abonada",
      factura: "",
      detalles: `Cobro OS — facturado en ${mesFmt(pr.mesFacturado)}`,
      auto: true,
      autoOrigen: "cobranza"
    });
  }
}
// Re-sincroniza todas las presentaciones cobradas (idempotente)
function syncTodasCobranzas() {
  (state.presentaciones||[]).forEach(pr => syncCobroOSALineaFac(pr));
}

// ============================================================
// ANOTADOR PERSONAL
// ============================================================
function renderAnotador() {
  const list = document.getElementById("anotador-list");
  if (!list) return;
  const items = state.anotador || [];
  if (items.length === 0) {
    list.innerHTML = '<div class="anotador-empty">Tu libreta está vacía.<br>Anotá lo primero que se te cruce.</div>';
  } else {
    // Más recientes arriba, no hechos primero
    const ordenados = [...items].sort((a, b) => {
      if (a.hecho !== b.hecho) return a.hecho ? 1 : -1;
      return (b.timestamp || 0) - (a.timestamp || 0);
    });
    list.innerHTML = ordenados.map(it => `
      <div class="anotador-item ${it.hecho ? "hecho" : ""}" data-id="${it.id}">
        <input type="checkbox" data-action="anotador-toggle-hecho" data-id="${it.id}" ${it.hecho ? "checked" : ""}>
        <span class="anotador-item-text" data-action="anotador-editar" data-id="${it.id}">${escapeHtml(it.texto)}</span>
        <button class="anotador-item-delete" data-action="anotador-eliminar" data-id="${it.id}" title="Eliminar">×</button>
      </div>
    `).join("");
  }
  // Resumen al pie
  const activos = items.filter(i => !i.hecho).length;
  const resumen = document.getElementById("anotador-resumen");
  if (resumen) {
    if (items.length === 0) resumen.textContent = "";
    else resumen.textContent = `${activos} pendiente${activos!==1?"s":""} · ${items.length} total`;
  }
  const clearBtn = document.querySelector(".anotador-clear");
  if (clearBtn) clearBtn.disabled = !items.some(i => i.hecho);
  bindHandlers();
}

function agregarAnotacion(texto) {
  texto = (texto||"").trim();
  if (!texto) return;
  state.anotador = state.anotador || [];
  state.anotador.push({
    id: "an_" + Date.now() + "_" + Math.random().toString(36).slice(2,6),
    texto, hecho: false, timestamp: Date.now()
  });
  saveState(); renderAnotador();
}


// ============================================================
// HANDLERS
// ============================================================
function bindHandlers() {
  document.querySelectorAll("[data-action]").forEach(el => {
    if (el.__bound) return;
    el.__bound = true;
    el.addEventListener("click", handleAction);
  });
  // Asegurar spellcheck en es-AR en todos los inputs de texto y textareas
  document.querySelectorAll("textarea, input[type='text'], input:not([type])").forEach(el => {
    if (el.__spellChecked) return;
    el.__spellChecked = true;
    el.setAttribute("spellcheck", "true");
    el.setAttribute("lang", "es-AR");
  });
}

function handleAction(e) {
  // Frenar propagación: cada elemento con data-action procesa solo lo suyo.
  // Sin esto, el click en un chip de turno se propagaba al div de la celda
  // y abría un segundo modal encima (el de "agendar nuevo") tapando al primero.
  e.stopPropagation();
  const el = e.currentTarget;
  const action = el.dataset.action;

  // Grabación por voz
  if (action === "grabar-sesion") return modalGrabarSesion(el.dataset.pid || currentPacienteId);
  if (action === "vsv-empezar") return vsvEmpezar();
  if (action === "vsv-detener") return vsvDetener();
  if (action === "vsv-procesar") return vsvProcesar();
  if (action === "vsv-guardar") return vsvGuardar();
  if (action === "vsv-borrar") {
    if (!confirm("¿Borrar la transcripción actual?")) return;
    _voiceFinal = ""; _voiceInterim = ""; _voiceParsed = null;
    limpiarBorradorGrabacion();
    renderModalGrabar();
    return;
  }
  if (action === "vsv-cambiar-paciente") {
    _voicePid = el.value;
    return;
  }
  if (action === "cerrar-grabar") return cerrarModalGrabar();

  // Anotador
  if (action === "anotador-toggle-hecho") {
    const it = (state.anotador||[]).find(x => x.id === el.dataset.id);
    if (it) { it.hecho = !it.hecho; saveState(); renderAnotador(); }
    return;
  }
  if (action === "anotador-eliminar") {
    state.anotador = (state.anotador||[]).filter(x => x.id !== el.dataset.id);
    saveState(); renderAnotador();
    return;
  }
  if (action === "anotador-limpiar") {
    const hechos = (state.anotador||[]).filter(x => x.hecho).length;
    if (hechos === 0) return;
    if (!confirm(`Borrar ${hechos} anotación${hechos!==1?"es":""} ya hecha${hechos!==1?"s":""}?`)) return;
    state.anotador = (state.anotador||[]).filter(x => !x.hecho);
    saveState(); renderAnotador();
    return;
  }
  if (action === "anotador-editar") {
    const span = el;
    if (span.getAttribute("contenteditable") === "true") return;
    span.setAttribute("contenteditable", "true");
    span.focus();
    // Seleccionar todo
    const range = document.createRange();
    range.selectNodeContents(span);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    const guardar = () => {
      span.removeAttribute("contenteditable");
      const it = (state.anotador||[]).find(x => x.id === span.dataset.id);
      const nuevo = (span.textContent||"").trim();
      if (it) {
        if (!nuevo) {
          state.anotador = state.anotador.filter(x => x.id !== it.id);
        } else {
          it.texto = nuevo;
        }
        saveState(); renderAnotador();
      }
    };
    span.addEventListener("blur", guardar, { once: true });
    span.addEventListener("keydown", ke => {
      if (ke.key === "Enter") { ke.preventDefault(); span.blur(); }
      if (ke.key === "Escape") { ke.preventDefault(); span.textContent = (state.anotador||[]).find(x=>x.id===span.dataset.id)?.texto || ""; span.blur(); }
    });
    return;
  }

  if (action === "nuevo-turno") return modalTurno(null, hoyISO());
  if (action === "abrir-turno") {
    const t = state.turnos.find(x => x.id === el.dataset.id);
    return modalTurno(t);
  }
  if (action === "celda-agenda") return modalTurno(null, el.dataset.fecha, el.dataset.hora);
  if (action === "guardar-turno") {
    const id = el.dataset.id;
    const horaLibre = document.getElementById("t-hora-libre");
    const hora = (horaLibre && horaLibre.style.display !== "none") ? horaLibre.value : document.getElementById("t-hora").value;
    const esLibre = !!document.getElementById("t-es-libre")?.checked;
    const etiquetaLibre = esLibre ? (document.getElementById("t-libre").value || "").trim() : "";
    if (esLibre && !etiquetaLibre) {
      showToast("Escribí una descripción del turno puntual antes de guardar");
      return;
    }
    const data = {
      id,
      fecha: document.getElementById("t-fecha").value,
      hora,
      pacienteId: esLibre ? "" : document.getElementById("t-paciente").value,
      etiquetaLibre,
      estado: document.getElementById("t-estado").value,
      notas: document.getElementById("t-notas").value
    };
    // Siempre buscar por id: si existe → reemplazar; si no → agregar.
    // Esto previene duplicados aún si el flag data-new vino mal.
    const idx = state.turnos.findIndex(x => x.id === id);
    if (idx >= 0) state.turnos[idx] = { ...state.turnos[idx], ...data };
    else state.turnos.push(data);
    // Limpieza defensiva por si quedaron duplicados de antes
    dedupTurnos();
    saveState(); cerrarModal(); render();
    return;
  }
  if (action === "toggle-libre") {
    // Alterna entre selector de paciente e input de texto libre
    const esLibre = el.checked;
    const rowPac = document.getElementById("t-row-paciente");
    const rowLibre = document.getElementById("t-row-libre");
    if (rowPac) rowPac.style.display = esLibre ? "none" : "";
    if (rowLibre) rowLibre.style.display = esLibre ? "" : "none";
    if (esLibre) {
      const inp = document.getElementById("t-libre");
      if (inp) inp.focus();
    }
    return;
  }
  if (action === "usar-hora-libre") {
    const sel = document.getElementById("t-hora");
    const libre = document.getElementById("t-hora-libre");
    if (sel && libre) {
      sel.style.display = "none";
      libre.style.display = "block";
      libre.focus();
      el.style.display = "none";
    }
    return;
  }
  if (action === "generar-turnos") {
    const agregados = generarTurnosRecurrentes();
    const ms = mesActualISO();
    if (agregados === 0) {
      showToast(`Ya estaba al día. No se generaron turnos nuevos (${mesFmt(ms)} y ${mesFmt(mesNext(ms))} ya estaban completos).`);
    } else {
      render();
      showToast(`Se generaron ${agregados} turno${agregados!==1?"s":""} para ${mesFmt(ms)} y ${mesFmt(mesNext(ms))}.`);
    }
    return;
  }
  // Horarios fijos del paciente
  if (action === "agregar-horario-fijo") {
    const p = pacienteById(currentPacienteId);
    if (!p.horariosFijos) p.horariosFijos = [];
    // Leer los actuales del DOM antes de re-render para no perderlos
    document.querySelectorAll("[data-hf-dia]").forEach(sel => {
      const i = sel.dataset.hfDia;
      const horaInp = document.querySelector(`[data-hf-hora="${i}"]`);
      if (p.horariosFijos[i]) {
        p.horariosFijos[i].diaSemana = parseInt(sel.value);
        if (horaInp) p.horariosFijos[i].hora = horaInp.value;
      }
    });
    p.horariosFijos.push({ diaSemana: 2, hora: "16:00" });
    saveState(); render();
    return;
  }
  if (action === "quitar-horario-fijo") {
    const p = pacienteById(currentPacienteId);
    const i = parseInt(el.dataset.i);
    // Antes de quitar, capturar el resto del DOM
    const rows = [];
    document.querySelectorAll("[data-hf-dia]").forEach(sel => {
      const idx = parseInt(sel.dataset.hfDia);
      const horaInp = document.querySelector(`[data-hf-hora="${idx}"]`);
      if (idx !== i && horaInp) rows.push({ diaSemana: parseInt(sel.value), hora: horaInp.value });
    });
    p.horariosFijos = rows;
    saveState(); render();
    showToast("Horario quitado. Los turnos ya generados no se borran — eliminalos desde la agenda si querés.");
    return;
  }
  if (action === "guardar-horarios-fijos") {
    const p = pacienteById(currentPacienteId);
    if (!p.horariosFijos) p.horariosFijos = [];
    const nuevos = [];
    document.querySelectorAll("[data-hf-dia]").forEach(sel => {
      const i = sel.dataset.hfDia;
      const horaInp = document.querySelector(`[data-hf-hora="${i}"]`);
      if (horaInp && horaInp.value) {
        nuevos.push({ diaSemana: parseInt(sel.value), hora: horaInp.value });
      }
    });
    p.horariosFijos = nuevos;
    saveState();
    const agregados = generarTurnosRecurrentes();
    render();
    if (nuevos.length === 0) {
      showToast("Horarios guardados (vacíos). No se generaron turnos.");
    } else {
      showToast(`Horarios guardados. ${agregados} turno${agregados!==1?"s":""} generado${agregados!==1?"s":""} (${mesFmt(mesActualISO())} + ${mesFmt(mesNext(mesActualISO()))}).`);
    }
    return;
  }
  // Objetivos
  if (action === "mes-obj-prev") { currentMesObj = mesPrev(currentMesObj); return render(); }
  if (action === "mes-obj-next") { currentMesObj = mesNext(currentMesObj); return render(); }
  if (action === "mes-obj-hoy") { currentMesObj = mesActualISO(); return render(); }
  if (action === "nuevo-objetivo") return modalObjetivo(null, currentPacienteId, currentMesObj);
  if (action === "editar-objetivo") return modalObjetivo(state.objetivos.find(o => o.id === el.dataset.id));
  if (action === "guardar-objetivo") {
    const id = el.dataset.id; const isNew = el.dataset.new === "true";
    const data = {
      id, pacienteId: el.dataset.pid,
      mes: document.getElementById("o-mes").value,
      area: document.getElementById("o-area").value,
      descripcion: document.getElementById("o-desc").value.trim(),
      estado: document.getElementById("o-estado").value
    };
    if (!data.descripcion) { alert("Escribí una descripción del objetivo"); return; }
    if (isNew) state.objetivos.push(data);
    else { const i = state.objetivos.findIndex(x => x.id === id); if (i>=0) state.objetivos[i] = data; }
    saveState(); cerrarModal(); render();
    return;
  }
  if (action === "eliminar-objetivo") {
    if (!confirm("¿Eliminar este objetivo?")) return;
    const o = state.objetivos.find(x => x.id === el.dataset.id);
    const p = pacienteById(o.pacienteId);
    enviarAPapelera("objetivo", `Objetivo ${mesFmt(o.mes)} — ${pacienteNombre(p)}: ${o.descripcion.slice(0,50)}…`, o);
    state.objetivos = state.objetivos.filter(x => x.id !== el.dataset.id);
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast("Objetivo eliminado", doUndo);
    return;
  }
  if (action === "toggle-objetivo-logrado") {
    const o = state.objetivos.find(x => x.id === el.dataset.id);
    if (o) { o.estado = o.estado === "logrado" ? "en curso" : "logrado"; saveState(); render(); }
    return;
  }
  if (action === "duplicar-objetivos") {
    const mesAnt = mesPrev(currentMesObj);
    const objsAnt = state.objetivos.filter(o => o.pacienteId === currentPacienteId && o.mes === mesAnt);
    objsAnt.forEach(o => {
      state.objetivos.push({ ...o, id: nuevoId(), mes: currentMesObj, estado: "en curso" });
    });
    saveState(); render();
    showToast(`${objsAnt.length} objetivos duplicados a ${mesFmt(currentMesObj)}`);
    return;
  }
  if (action === "copiar-objetivos") {
    const p = pacienteById(currentPacienteId);
    const objs = state.objetivos.filter(o => o.pacienteId === currentPacienteId && o.mes === currentMesObj);
    if (objs.length === 0) { alert("No hay objetivos cargados para este mes."); return; }
    const lines = [`Objetivos de ${pacienteNombre(p)} — ${mesFmt(currentMesObj)}:`, ""];
    AREAS_OBJ.forEach(area => {
      const objsArea = objs.filter(o => o.area === area.id);
      if (objsArea.length === 0) return;
      lines.push(`${area.label}:`);
      objsArea.forEach(o => lines.push(`  - ${o.descripcion} [${o.estado}]`));
      lines.push("");
    });
    const txt = lines.join("\n");
    navigator.clipboard.writeText(txt).then(() => {
      showToast("Objetivos copiados — pegalos en el chat con la skill");
    }).catch(() => {
      alert("No pude copiar automáticamente. Copialo manual:\n\n" + txt);
    });
    return;
  }

  if (action === "config-agenda") return modalConfigAgenda();
  if (action === "guardar-config-agenda") {
    state.config.horaInicio = document.getElementById("c-inicio").value;
    state.config.horaFin = document.getElementById("c-fin").value;
    state.config.slotMinutes = parseInt(document.getElementById("c-slot").value) || 45;
    saveState(); cerrarModal(); render();
    return;
  }
  if (action === "eliminar-turno") {
    if (!confirm("¿Eliminar este turno?")) return;
    const t = state.turnos.find(x => x.id === el.dataset.id);
    const p = pacienteById(t.pacienteId);
    enviarAPapelera("turno", `Turno ${fmtFechaCorta(t.fecha)} ${t.hora} — ${pacienteNombre(p)}`, t);
    state.turnos = state.turnos.filter(x => x.id !== el.dataset.id);
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast("Turno eliminado", doUndo);
    return;
  }
  if (action === "semana-anterior") { currentWeekStart = addDays(currentWeekStart, -7); return render(); }
  if (action === "semana-siguiente") { currentWeekStart = addDays(currentWeekStart, 7); return render(); }
  if (action === "semana-hoy") { currentWeekStart = startOfWeek(hoyISO()); return render(); }
  if (action === "agenda-vista-semana") { currentAgendaVista = "semana"; return render(); }
  if (action === "agenda-vista-mes") { currentAgendaVista = "mes"; return render(); }
  if (action === "mes-agenda-prev") { currentAgendaMes = mesPrev(currentAgendaMes); return render(); }
  if (action === "mes-agenda-next") { currentAgendaMes = mesNext(currentAgendaMes); return render(); }
  if (action === "mes-agenda-hoy") { currentAgendaMes = hoyISO().slice(0,7); return render(); }
  if (action === "abrir-dia-calendario") return modalDiaCalendario(el.dataset.fecha);
  if (action === "nuevo-turno-dia") {
    cerrarModal();
    return modalTurno(null, el.dataset.fecha);
  }
  if (action === "guardar-nota-dia") {
    const fecha = el.dataset.fecha;
    const texto = (document.getElementById("dia-nota")?.value || "").trim();
    state.notasCalendario = state.notasCalendario || [];
    const idx = state.notasCalendario.findIndex(n => n.fecha === fecha);
    if (!texto) {
      // Si quedó vacío, eliminar la nota
      if (idx >= 0) state.notasCalendario.splice(idx, 1);
    } else {
      if (idx >= 0) state.notasCalendario[idx].texto = texto;
      else state.notasCalendario.push({ id: nuevoId(), fecha, texto });
    }
    saveState(); cerrarModal(); render();
    showToast(texto ? "Nota guardada" : "Nota eliminada");
    return;
  }
  if (action === "eliminar-nota-dia") {
    if (!confirm("¿Eliminar la nota de este día?")) return;
    state.notasCalendario = (state.notasCalendario||[]).filter(n => n.fecha !== el.dataset.fecha);
    saveState(); cerrarModal(); render();
    showToast("Nota eliminada");
    return;
  }

  if (action === "abrir-paciente") {
    currentPacienteId = el.dataset.id;
    currentPacienteTab = "datos";
    return render();
  }
  if (action === "volver-pacientes") { currentPacienteId = null; return render(); }
  if (action === "tab-paciente") { currentPacienteTab = el.dataset.tab; return render(); }
  if (action === "nuevo-paciente") return modalPaciente(null);
  if (action === "editar-paciente") return modalPaciente(pacienteById(currentPacienteId));
  if (action === "guardar-paciente") {
    const id = el.dataset.id;
    const isNew = el.dataset.new === "true";
    const fechaNac = document.getElementById("p-fnac") ? document.getElementById("p-fnac").value : "";
    const data = {
      id,
      nombre: document.getElementById("p-nombre").value.trim(),
      apellido: document.getElementById("p-apellido").value.trim(),
      dni: document.getElementById("p-dni").value.trim(),
      tipo: document.getElementById("p-tipo").value,
      obraSocial: document.getElementById("p-os").value.trim(),
      importePorSesion: parseMoney(document.getElementById("p-importe").value),
      fechaNacimiento: fechaNac,
      edad: calcularEdad(fechaNac),
      grado: document.getElementById("p-grado").value,
      fechaInicio: document.getElementById("p-inicio").value,
      escuela: document.getElementById("p-escuela").value,
      carpetaCTP: document.getElementById("p-carpeta").value,
      activo: true
    };
    if (!data.nombre || !data.apellido) { alert("Nombre y apellido son obligatorios"); return; }
    if (isNew) {
      data.id = "id_" + data.apellido.toLowerCase().replace(/\s/g,"-") + "-" + data.nombre.toLowerCase().split(" ")[0];
      data.horariosFijos = [];
      state.pacientes.push(data);
      currentPacienteId = data.id;
    } else {
      const idx = state.pacientes.findIndex(x => x.id === id);
      if (idx >= 0) state.pacientes[idx] = { ...state.pacientes[idx], ...data };
    }
    saveState(); cerrarModal(); render();
    return;
  }
  if (action === "toggle-activo") {
    const p = pacienteById(currentPacienteId);
    p.activo = !p.activo;
    saveState(); render(); return;
  }
  if (action === "eliminar-paciente") {
    const id = el.dataset.id;
    const p = pacienteById(id);
    const nSes = state.sesiones.filter(s => s.pacienteId === id).length;
    const nFac = state.facturacion.filter(f => f.pacienteId === id).length;
    const advertencia = (nSes || nFac) ? `\n\nEste paciente tiene ${nSes} sesiones y ${nFac} líneas de facturación que también se borrarán.` : "";
    if (!confirm(`¿Eliminar a ${pacienteNombre(p)}?${advertencia}\n\nEl paciente y todo lo asociado va a la papelera. Podés restaurarlo cuando quieras.\nSi solo querés sacarlo de los activos sin moverlo, usá "Archivar".`)) return;
    const relacionados = {
      sesiones: state.sesiones.filter(s => s.pacienteId === id),
      facturacion: state.facturacion.filter(f => f.pacienteId === id),
      turnos: state.turnos.filter(t => t.pacienteId === id)
    };
    enviarAPapelera("paciente", `${pacienteNombre(p)} (+ ${relacionados.sesiones.length} ses, ${relacionados.facturacion.length} fac, ${relacionados.turnos.length} turnos)`, p, relacionados);
    state.pacientes = state.pacientes.filter(x => x.id !== id);
    state.sesiones = state.sesiones.filter(s => s.pacienteId !== id);
    state.facturacion = state.facturacion.filter(f => f.pacienteId !== id);
    state.turnos = state.turnos.filter(t => t.pacienteId !== id);
    currentPacienteId = null;
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast(`${pacienteNombre(p)} movido a papelera`, doUndo);
    return;
  }
  if (action === "imprimir-hc") { window.print(); return; }
  if (action === "exportar-paciente") {
    const p = pacienteById(currentPacienteId);
    if (!p) return;
    return modalExportPaciente(p);
  }
  if (action === "copiar-export") {
    const texto = document.getElementById("export-preview")?.value || "";
    navigator.clipboard.writeText(texto).then(() => {
      el.textContent = "✓ Copiado al portapapeles";
      setTimeout(() => { el.textContent = "📋 Copiar al portapapeles"; }, 2000);
      showToast("Texto copiado — pegalo en la otra conversación con Claude");
    }).catch(() => {
      const ta = document.getElementById("export-preview");
      if (ta) { ta.focus(); ta.select(); }
      showToast("Seleccioná y copiá manual con Ctrl+C");
    });
    return;
  }
  if (action === "descargar-export") {
    const texto = document.getElementById("export-preview")?.value || "";
    const p = pacienteById(currentPacienteId);
    const blob = new Blob([texto], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ficha-${p ? p.apellido.toLowerCase().replace(/\s/g,"-") : "paciente"}-${hoyISO()}.md`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Archivo descargado — adjuntalo en la otra conversación");
    return;
  }

  // Facturación
  if (action === "tab-fac") { currentFacTab = el.dataset.tab; return render(); }
  if (action === "mes-fac-prev") { currentMesFact = mesPrev(currentMesFact); return render(); }
  if (action === "mes-fac-next") { currentMesFact = mesNext(currentMesFact); return render(); }
  if (action === "mes-fac-hoy") { currentMesFact = mesActualISO(); return render(); }
  if (action === "nueva-fac") return modalFac(null);
  if (action === "editar-fac") {
    const fac = state.facturacion.find(f => f.id === el.dataset.id);
    if (fac && fac.auto) {
      // Esta línea se generó desde Cobranzas — redirigir
      currentFacTab = "cobranzas";
      render();
      showToast("Esta línea viene de un cobro de OS. Editala desde Cobranzas por OS.");
      return;
    }
    return modalFac(fac);
  }
  if (action === "guardar-fac") {
    const id = el.dataset.id; const isNew = el.dataset.new === "true";
    const sesionesN = parseInt(document.getElementById("f-sesiones").value) || 0;
    let abonadasN = parseInt(document.getElementById("f-abonadas")?.value);
    if (isNaN(abonadasN)) abonadasN = sesionesN; // default: todas abonadas
    abonadasN = Math.max(0, Math.min(sesionesN, abonadasN));
    const data = {
      id,
      mes: document.getElementById("f-mes").value,
      pacienteId: document.getElementById("f-paciente").value,
      sesiones: sesionesN,
      sesionesAbonadas: abonadasN,
      importePorSesion: parseMoney(document.getElementById("f-importe").value),
      obraSocialFact: document.getElementById("f-os").value,
      estadoPago: abonadasN === 0 ? "debe" : (abonadasN === sesionesN ? "abonada" : "parcial"),
      factura: document.getElementById("f-factura").value,
      detalles: document.getElementById("f-detalles").value
    };
    if (isNew) state.facturacion.push(data);
    else { const i = state.facturacion.findIndex(x => x.id === id); if (i>=0) state.facturacion[i] = data; }
    saveState(); cerrarModal(); render();
    return;
  }
  if (action === "eliminar-fac") {
    if (!confirm("¿Eliminar esta línea de facturación?")) return;
    const f = state.facturacion.find(x => x.id === el.dataset.id);
    const p = pacienteById(f.pacienteId);
    enviarAPapelera("fac", `Facturación ${mesFmt(f.mes)} — ${pacienteNombre(p)} (${fmtMoney((f.sesiones||0)*(f.importePorSesion||0))})`, f);
    state.facturacion = state.facturacion.filter(x => x.id !== el.dataset.id);
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast("Línea eliminada", doUndo);
    return;
  }
  if (action === "nuevo-gasto") return modalGasto(null);
  if (action === "editar-gasto") return modalGasto(state.gastos.find(g => g.id === el.dataset.id));
  if (action === "guardar-gasto") {
    const id = el.dataset.id; const isNew = el.dataset.new === "true";
    const data = {
      id,
      mes: document.getElementById("g-mes").value,
      concepto: document.getElementById("g-concepto").value,
      monto: parseMoney(document.getElementById("g-monto").value)
    };
    if (isNew) state.gastos.push(data);
    else { const i = state.gastos.findIndex(x => x.id === id); if (i>=0) state.gastos[i] = data; }
    saveState(); cerrarModal(); render();
    return;
  }
  if (action === "eliminar-gasto") {
    if (!confirm("¿Eliminar este gasto?")) return;
    const g = state.gastos.find(x => x.id === el.dataset.id);
    enviarAPapelera("gasto", `Gasto ${mesFmt(g.mes)} — ${g.concepto} (${fmtMoney(g.monto)})`, g);
    state.gastos = state.gastos.filter(x => x.id !== el.dataset.id);
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast("Gasto eliminado", doUndo);
    return;
  }
  if (action === "nueva-presentacion") return modalPresentacion(null);
  if (action === "editar-presentacion") return modalPresentacion(state.presentaciones.find(p => p.id === el.dataset.id));
  if (action === "guardar-presentacion") {
    const id = el.dataset.id; const isNew = el.dataset.new === "true";
    const data = {
      id,
      mesFacturado: document.getElementById("pr-mes").value,
      obraSocial: document.getElementById("pr-os").value,
      pacienteId: document.getElementById("pr-paciente").value || "",
      monto: parseMoney(document.getElementById("pr-monto").value),
      fechaPresentacion: document.getElementById("pr-fpres").value,
      fechaCobro: document.getElementById("pr-fcobro").value,
      estado: document.getElementById("pr-estado").value,
      notas: document.getElementById("pr-notas").value
    };
    if (isNew) state.presentaciones.push(data);
    else { const i = state.presentaciones.findIndex(x => x.id === id); if (i>=0) state.presentaciones[i] = data; }
    // Sincronizar línea automática en facturación según el cobro
    syncCobroOSALineaFac(data);
    saveState(); cerrarModal(); render();
    if (data.estado === "cobrado" && data.fechaCobro) {
      showToast(`Cobro sumado a ${mesFmt(data.fechaCobro.slice(0,7))}`);
    }
    return;
  }
  // Leyendas de facturación
  if (action === "nueva-leyenda") return modalLeyenda(null);
  if (action === "editar-leyenda") return modalLeyenda((state.leyendas||[]).find(l => l.id === el.dataset.id));
  if (action === "guardar-leyenda") {
    const id = el.dataset.id; const isNew = el.dataset.new === "true";
    const pids = Array.from(document.querySelectorAll(".ley-pac-check"))
      .filter(c => c.checked).map(c => c.value);
    const os = document.getElementById("ley-os").value.trim();
    const data = {
      id,
      nombre: os, // el "nombre" se setea automáticamente igual a la OS
      obraSocial: os,
      pacienteIds: pids,
      datosFacturacion: document.getElementById("ley-datos")?.value || "",
      texto: document.getElementById("ley-texto").value
    };
    if (!data.obraSocial) { showToast("Cargá la obra social"); return; }
    if (!data.texto.trim()) { showToast("La leyenda está vacía."); return; }
    if (!state.leyendas) state.leyendas = [];
    if (isNew) state.leyendas.push(data);
    else { const i = state.leyendas.findIndex(x => x.id === id); if (i>=0) state.leyendas[i] = data; }
    saveState(); cerrarModal(); render();
    showToast(isNew ? "Leyenda agregada" : "Leyenda guardada");
    return;
  }
  if (action === "eliminar-leyenda") {
    if (!confirm("¿Eliminar esta leyenda?")) return;
    state.leyendas = (state.leyendas||[]).filter(x => x.id !== el.dataset.id);
    saveState(); cerrarModal(); render();
    showToast("Leyenda eliminada");
    return;
  }
  if (action === "copiar-leyenda") {
    const l = (state.leyendas||[]).find(x => x.id === el.dataset.id);
    if (!l) return;
    const pids = Array.isArray(l.pacienteIds) ? l.pacienteIds : (l.pacienteId ? [l.pacienteId] : []);
    if (pids.length > 1) {
      // Picker rápido para elegir cuál paciente
      modalElegirPacienteCopia(l);
    } else {
      copiarLeyendaAlPortapapeles(l, pids[0], el);
    }
    return;
  }
  if (action === "copiar-leyenda-paciente") {
    const l = (state.leyendas||[]).find(x => x.id === el.dataset.lid);
    if (l) copiarLeyendaAlPortapapeles(l, el.dataset.pid, null);
    return;
  }

  if (action === "eliminar-presentacion") {
    if (!confirm("¿Eliminar esta presentación?")) return;
    const pr = state.presentaciones.find(x => x.id === el.dataset.id);
    enviarAPapelera("presentacion", `Presentación ${mesFmt(pr.mesFacturado)} — ${pr.obraSocial} (${fmtMoney(pr.monto)})`, pr);
    state.presentaciones = state.presentaciones.filter(x => x.id !== el.dataset.id);
    // Limpiar línea auto si existía
    state.facturacion = state.facturacion.filter(f => f.id !== `auto_cobro_${el.dataset.id}`);
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast("Presentación eliminada", doUndo);
    return;
  }

  if (action === "undo") return doUndo();

  // Papelera
  if (action === "papelera-restaurar") {
    const item = restaurarDePapelera(el.dataset.id);
    if (item) { saveState(); render(); refreshUndoBtn(); showToast(`Restaurado: ${item.descripcion}`); }
    return;
  }
  if (action === "papelera-eliminar") {
    if (!confirm("¿Eliminar definitivamente? No se puede recuperar después.")) return;
    eliminarDePapelera(el.dataset.id);
    saveState(); render(); refreshUndoBtn();
    return;
  }
  if (action === "papelera-vaciar") {
    if (!confirm(`¿Vaciar la papelera (${state.papelera.length} ítems)? No se puede recuperar después.`)) return;
    vaciarPapelera();
    saveState(); render(); refreshUndoBtn();
    return;
  }

  // Tutores / familia
  if (action === "agregar-tutor") {
    const p = pacienteById(currentPacienteId);
    if (!p.tutores) p.tutores = [];
    // Capturar lo que ya hay en el form antes de re-render
    leerTutoresDOM(p);
    p.tutores.push({ nombre: "", relacion: "madre", ocupacion: "", telefono: "" });
    saveState(); render();
    return;
  }
  if (action === "quitar-tutor") {
    const p = pacienteById(currentPacienteId);
    if (!confirm("¿Quitar este familiar/tutor?")) return;
    leerTutoresDOM(p);
    const i = parseInt(el.dataset.i);
    p.tutores.splice(i, 1);
    saveState(); render();
    return;
  }
  if (action === "guardar-tutores") {
    const p = pacienteById(currentPacienteId);
    leerTutoresDOM(p);
    saveState(); render();
    showToast("Familia/tutores guardado");
    return;
  }

  if (action === "guardar-datos") {
    const p = pacienteById(currentPacienteId);
    document.querySelectorAll("[data-edit-field]").forEach(inp => {
      p[inp.dataset.editField] = inp.value;
    });
    // Si se cargó/modificó fechaNacimiento, recalcular edad
    if (p.fechaNacimiento) p.edad = calcularEdad(p.fechaNacimiento);
    saveState(); render();
    alert("Datos guardados");
    return;
  }
  if (action === "guardar-hc") {
    const p = pacienteById(currentPacienteId);
    document.querySelectorAll("[data-edit-field]").forEach(inp => { p[inp.dataset.editField] = inp.value; });
    saveState(); render();
    alert("Historia clínica guardada");
    return;
  }
  if (action === "copiar-ruta") {
    const p = pacienteById(currentPacienteId);
    navigator.clipboard.writeText(p.carpetaCTP || "");
    el.textContent = "Copiado";
    setTimeout(() => el.textContent = "Copiar ruta", 1500);
    return;
  }

  if (action === "planificar-sesion") return modalSesion(null, el.dataset.pid, "planificada");
  if (action === "registrar-sesion") return modalSesion(null, el.dataset.pid, "realizada");
  if (action === "toggle-mes-sesiones") {
    const mes = el.dataset.mes;
    if (!_mesesSesionesAbiertos) _mesesSesionesAbiertos = new Set();
    if (_mesesSesionesAbiertos.has(mes)) _mesesSesionesAbiertos.delete(mes);
    else _mesesSesionesAbiertos.add(mes);
    render();
    return;
  }
  if (action === "abrir-borrador-sesion") {
    // El modal de sesión ya recupera el borrador automáticamente al abrir
    const b = cargarBorradorSesion();
    return modalSesion(null, el.dataset.pid, (b && b.estado) ? b.estado : "realizada");
  }
  if (action === "descartar-borrador-lista") {
    if (!confirm("¿Descartar el borrador? Lo que tenías escrito se pierde.")) return;
    limpiarBorradorSesion();
    render();
    showToast("Borrador descartado");
    return;
  }
  if (action === "abrir-sesion") {
    const s = state.sesiones.find(x => x.id === el.dataset.id);
    return modalSesion(s);
  }
  if (action === "guardar-sesion") {
    const id = el.dataset.id;
    const isNew = el.dataset.new === "true";
    const data = {
      id, pacienteId: el.dataset.pid,
      fecha: document.getElementById("s-fecha").value,
      hora: document.getElementById("s-hora")?.value || "",
      estado: document.getElementById("s-estado").value,
      foco: document.getElementById("s-foco").value,
      planificacion: document.getElementById("s-planificacion").value,
      materiales: document.getElementById("s-materiales").value,
      observaciones: document.getElementById("s-observaciones").value,
      proximosPasos: document.getElementById("s-proximos").value,
      imagenes: JSON.parse(JSON.stringify(_sesionImagenes || []))
    };
    if (isNew) state.sesiones.push(data);
    else {
      const idx = state.sesiones.findIndex(x => x.id === id);
      if (idx >= 0) state.sesiones[idx] = data;
    }
    try { saveState(); }
    catch (err) {
      showToast("⚠ No pude guardar: tal vez se llenó el espacio. Probá borrar imágenes viejas o hacer backup.");
      return;
    }
    limpiarBorradorSesion();  // borrador ya está guardado en serio
    _sesionPacienteActual = null;
    cerrarModal(); render();
    return;
  }
  if (action === "descartar-borrador-sesion") {
    if (!confirm("¿Descartar el borrador y empezar de cero?")) return;
    limpiarBorradorSesion();
    cerrarModal();
    return;
  }
  if (action === "quitar-imagen-edit") {
    _sesionImagenes = (_sesionImagenes||[]).filter(im => im.id !== el.dataset.id);
    renderImagenesSesion();
    return;
  }
  if (action === "zoom-imagen-edit") {
    const im = (_sesionImagenes||[]).find(x => x.id === el.dataset.id);
    if (im) abrirZoomImagen(im);
    return;
  }
  if (action === "zoom-imagen-vista") {
    // Imagen ya guardada en una sesión existente
    const sid = el.dataset.sid;
    const iid = el.dataset.iid;
    const ses = state.sesiones.find(s => s.id === sid);
    const im = ses && (ses.imagenes||[]).find(x => x.id === iid);
    if (im) abrirZoomImagen(im);
    return;
  }
  if (action === "eliminar-sesion") {
    if (!confirm("¿Eliminar esta sesión?")) return;
    const s = state.sesiones.find(x => x.id === el.dataset.id);
    const p = pacienteById(s.pacienteId);
    enviarAPapelera("sesion", `Sesión ${fmtFechaCorta(s.fecha)} — ${pacienteNombre(p)}`, s);
    state.sesiones = state.sesiones.filter(x => x.id !== el.dataset.id);
    saveState(); cerrarModal(); render(); refreshUndoBtn();
    showToast("Sesión eliminada", doUndo);
    return;
  }

  if (action === "cerrar-modal") {
    guardarBorradorModalActivo();
    return cerrarModal();
  }

  if (action === "export-backup") {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const fecha = hoyISO();
    a.href = url;
    a.download = `consultorio-ctp-backup-${fecha}.json`;
    a.click();
    URL.revokeObjectURL(url);
    return;
  }
  if (action === "import-backup") {
    const inp = document.getElementById("import-file");
    inp.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.pacientes) throw new Error("Formato inválido");
          if (!confirm("¿Reemplazar todos los datos actuales con el backup?")) return;
          state = data;
          saveState(); render();
          alert("Backup importado correctamente");
        } catch (err) { alert("Error: " + err.message); }
      };
      reader.readAsText(file);
    };
    inp.click();
    return;
  }
  if (action === "reset-all") {
    if (!confirm("Esto borra TODO. ¿Estás segura?")) return;
    if (!confirm("Última confirmación: ¿borrar todo y empezar de cero? Se guarda un snapshot en la papelera por si te arrepentís.")) return;
    enviarAPapelera("reset", `Reset total del dashboard (${state.pacientes.length} pacientes, ${state.sesiones.length} sesiones, ${state.facturacion.length} líneas)`, state);
    const papGuardada = state.papelera;
    state = JSON.parse(JSON.stringify(INITIAL_STATE));
    state.papelera = papGuardada;
    saveState(); render(); refreshUndoBtn();
    showToast("Datos reseteados", doUndo);
    return;
  }
}

// ============================================================
// INICIO
// ============================================================
// Anotador: form para agregar (submit con Enter o click en "+")
const _anForm = document.getElementById("anotador-form");
if (_anForm) {
  _anForm.addEventListener("submit", e => {
    e.preventDefault();
    const inp = document.getElementById("anotador-input");
    if (inp) {
      agregarAnotacion(inp.value);
      inp.value = "";
      inp.focus();
    }
  });
}
// Backup: keydown directo en el input por si el submit no llega
const _anInput = document.getElementById("anotador-input");
if (_anInput) {
  _anInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      agregarAnotacion(_anInput.value);
      _anInput.value = "";
      _anInput.focus();
    }
  });
}
// Persistir tamaño del anotador (alto + ancho, si el usuario lo redimensiona)
const _anPanel = document.getElementById("anotador-panel");
const ANOTADOR_H_KEY = "consultorio_ctp_anotador_h";
const ANOTADOR_W_KEY = "consultorio_ctp_anotador_w";
if (_anPanel) {
  // Cargar tamaño previo
  const savedH = localStorage.getItem(ANOTADOR_H_KEY);
  if (savedH && parseInt(savedH) >= 220) _anPanel.style.height = savedH + "px";
  const savedW = localStorage.getItem(ANOTADOR_W_KEY);
  if (savedW && parseInt(savedW) >= 200) _anPanel.style.width = savedW + "px";
  // Observar cambios de tamaño y guardar (debounced)
  if (window.ResizeObserver) {
    let _saveTimer = null;
    const ro = new ResizeObserver(entries => {
      const r = entries[0].contentRect;
      const h = Math.round(r.height);
      const w = Math.round(r.width);
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => {
        localStorage.setItem(ANOTADOR_H_KEY, String(h));
        localStorage.setItem(ANOTADOR_W_KEY, String(w));
      }, 250);
    });
    ro.observe(_anPanel);
  }
}

// Guardar borrador si la página se va a cerrar/recargar mientras hay un modal abierto
window.addEventListener("beforeunload", () => {
  try { guardarBorradorModalActivo(); } catch(e) {}
});

// Limpiar turnos duplicados que pudieron haber quedado del estado anterior
dedupTurnos();
async function __boot() {
  // 1) Traer el estado real desde MongoDB (fuente de verdad).
  await cargarDesdeServidor();
  // 2) Rutinas de arranque sobre el estado ya cargado.
  // Sincronizar líneas auto de facturación con las presentaciones cobradas
  syncTodasCobranzas();
  saveState();
  // Generar turnos automáticos del mes actual + siguiente si hay pacientes con horarios fijos.
  // Es idempotente: no duplica los que ya existen.
  generarTurnosRecurrentes();
  render();
  refreshUndoBtn();
  renderAnotador();
}
__boot();
// Atajo de teclado Ctrl+Z / Cmd+Z
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.target.matches("input, textarea, select")) {
    e.preventDefault();
    doUndo();
  }
});
</script>
